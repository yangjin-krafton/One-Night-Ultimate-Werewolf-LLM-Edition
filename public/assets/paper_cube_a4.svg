<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="210mm" height="297mm" viewBox="0 0 210 297">
  <defs>
    <pattern id="tabPattern" patternUnits="userSpaceOnUse" width="2.5" height="2.5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="2.5" stroke="#bbb" stroke-width="0.25"/>
    </pattern>
  </defs>

  <!-- Title / Instructions -->
  <text x="105" y="22" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#222" font-weight="bold">A4 종이 큐브 도안 — 한 변 50mm</text>
  <text x="105" y="32" text-anchor="middle" font-family="sans-serif" font-size="3.4" fill="#555">실선(검정) = 자르기 · 점선 = 접기(계곡 접기) · 빗금 영역 = 풀칠</text>
  <text x="105" y="39" text-anchor="middle" font-family="sans-serif" font-size="3.4" fill="#555">인쇄 설정: 배율 100% / 실제 크기로 (Fit to page · 페이지에 맞춤 해제)</text>

  <!-- GLUE TABS (hatched fill) -->
  <g fill="url(#tabPattern)" stroke="none">
    <polygon points="58,73.5 65,66.5 101,66.5 108,73.5"/>    <!-- TT -->
    <polygon points="58,73.5 51,80.5 51,116.5 58,123.5"/>    <!-- TL -->
    <polygon points="108,73.5 115,80.5 115,116.5 108,123.5"/><!-- TR -->
    <polygon points="8,123.5 1,130.5 1,166.5 8,173.5"/>      <!-- LL -->
    <polygon points="58,173.5 51,180.5 51,216.5 58,223.5"/>  <!-- BtL -->
    <polygon points="108,173.5 115,180.5 115,216.5 108,223.5"/><!-- BtR -->
    <polygon points="58,223.5 65,230.5 101,230.5 108,223.5"/><!-- BtB -->
  </g>

  <!-- CUT outline (single closed path) -->
  <path d="M 65,66.5 L 101,66.5 L 108,73.5 L 115,80.5 L 115,116.5 L 108,123.5 L 208,123.5 L 208,173.5 L 108,173.5 L 115,180.5 L 115,216.5 L 108,223.5 L 101,230.5 L 65,230.5 L 58,223.5 L 51,216.5 L 51,180.5 L 58,173.5 L 8,173.5 L 1,166.5 L 1,130.5 L 8,123.5 L 58,123.5 L 51,116.5 L 51,80.5 L 58,73.5 Z"
    fill="none" stroke="black" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- FOLD lines (dashed) -->
  <g fill="none" stroke="#333" stroke-width="0.3" stroke-dasharray="2,1.5">
    <!-- Inter-face folds -->
    <line x1="58"  y1="123.5" x2="58"  y2="173.5"/>
    <line x1="108" y1="123.5" x2="108" y2="173.5"/>
    <line x1="158" y1="123.5" x2="158" y2="173.5"/>
    <line x1="58"  y1="123.5" x2="108" y2="123.5"/>
    <line x1="58"  y1="173.5" x2="108" y2="173.5"/>
    <!-- Tab base folds -->
    <line x1="58"  y1="73.5"  x2="58"  y2="123.5"/>
    <line x1="108" y1="73.5"  x2="108" y2="123.5"/>
    <line x1="58"  y1="73.5"  x2="108" y2="73.5"/>
    <line x1="58"  y1="173.5" x2="58"  y2="223.5"/>
    <line x1="108" y1="173.5" x2="108" y2="223.5"/>
    <line x1="58"  y1="223.5" x2="108" y2="223.5"/>
    <line x1="8"   y1="123.5" x2="8"   y2="173.5"/>
  </g>

  <!-- Face labels -->
  <g font-family="sans-serif" font-size="5" fill="#aaa" text-anchor="middle">
    <text x="83" y="100">윗면 (TOP)</text>
    <text x="33" y="151">왼쪽 (L)</text>
    <text x="83" y="151">앞면 (FRONT)</text>
    <text x="133" y="151">오른쪽 (R)</text>
    <text x="183" y="151">뒷면 (BACK)</text>
    <text x="83" y="202">바닥 (BOTTOM)</text>
  </g>

  <!-- Footer / size reference -->
  <text x="105" y="258" text-anchor="middle" font-family="sans-serif" font-size="3.2" fill="#666">완성 크기: 50 × 50 × 50 mm  ·  탭 깊이 7mm</text>

  <!-- 50mm scale bar for verification -->
  <g transform="translate(55,270)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#333" stroke-width="0.4"/>
    <line x1="0" y1="-1.5" x2="0" y2="1.5" stroke="#333" stroke-width="0.4"/>
    <line x1="50" y1="-1.5" x2="50" y2="1.5" stroke="#333" stroke-width="0.4"/>
    <text x="25" y="-2.5" text-anchor="middle" font-family="sans-serif" font-size="3" fill="#333">50 mm (스케일 확인용)</text>
  </g>
</svg>
