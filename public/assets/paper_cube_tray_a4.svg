<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="210mm" height="297mm" viewBox="0 0 210 297">
  <defs>
    <pattern id="tabPattern" patternUnits="userSpaceOnUse" width="2.5" height="2.5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="2.5" stroke="#bbb" stroke-width="0.25"/>
    </pattern>
  </defs>

  <!-- Title / Instructions -->
  <text x="105" y="18" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#222" font-weight="bold">A4 종이 큐브 수납 트레이 도안 — 50mm 큐브 6개(2×3) 넉넉 수납용</text>
  <text x="105" y="26" text-anchor="middle" font-family="sans-serif" font-size="3.4" fill="#555">실선(검정) = 자르기 · 점선 = 접기(계곡 접기) · 빗금 영역 = 풀칠</text>
  <text x="105" y="32" text-anchor="middle" font-family="sans-serif" font-size="3.4" fill="#555">인쇄 설정: 배율 100% / 실제 크기로 (Fit to page · 페이지에 맞춤 해제)</text>
  <text x="105" y="38" text-anchor="middle" font-family="sans-serif" font-size="3.2" fill="#888">두께 180~220g/㎡ 종이 권장 · 큐브 50mm 기준 · 큐브당 약 4~5mm 여유 · 상단 오픈 트레이</text>

  <!-- GLUE TABS (hatched fill) -->
  <g fill="url(#tabPattern)" stroke="none">
    <!-- Back wall left + right tabs -->
    <polygon points="50,39 43,46 43,62 50,69"/>
    <polygon points="160,39 167,46 167,62 160,69"/>
    <!-- Front wall left + right tabs -->
    <polygon points="50,233 43,240 43,256 50,263"/>
    <polygon points="160,233 167,240 167,256 160,263"/>
  </g>

  <!-- CUT outline (single closed path, clockwise from back-wall TL) -->
  <path d="M 50,39 L 160,39 L 167,46 L 167,62 L 160,69 L 190,69 L 190,233 L 160,233 L 167,240 L 167,256 L 160,263 L 50,263 L 43,256 L 43,240 L 50,233 L 20,233 L 20,69 L 50,69 L 43,62 L 43,46 Z"
    fill="none" stroke="black" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- FOLD lines (dashed) -->
  <g fill="none" stroke="#333" stroke-width="0.3" stroke-dasharray="2,1.5">
    <!-- Floor-to-wall folds (4 sides) -->
    <line x1="50"  y1="69"  x2="160" y2="69"/>
    <line x1="50"  y1="233" x2="160" y2="233"/>
    <line x1="50"  y1="69"  x2="50"  y2="233"/>
    <line x1="160" y1="69"  x2="160" y2="233"/>
    <!-- Tab-to-wall folds (back wall left + right) -->
    <line x1="50"  y1="39"  x2="50"  y2="69"/>
    <line x1="160" y1="39"  x2="160" y2="69"/>
    <!-- Tab-to-wall folds (front wall left + right) -->
    <line x1="50"  y1="233" x2="50"  y2="263"/>
    <line x1="160" y1="233" x2="160" y2="263"/>
  </g>

  <!-- Cube position guides on floor (light, non-cut) -->
  <g fill="none" stroke="#d8d8d8" stroke-width="0.2" stroke-dasharray="1,1">
    <!-- Horizontal cube boundaries (row dividers inside floor) -->
    <line x1="51"  y1="124" x2="159" y2="124"/>
    <line x1="51"  y1="178" x2="159" y2="178"/>
    <!-- Vertical cube boundary (column divider inside floor) -->
    <line x1="105" y1="70"  x2="105" y2="232"/>
  </g>

  <!-- Wall labels -->
  <g font-family="sans-serif" font-size="4" fill="#aaa" text-anchor="middle">
    <text x="105" y="57">뒷벽 (BACK · h 30mm)</text>
    <text x="35"  y="151">왼쪽 벽 (L)</text>
    <text x="175" y="151">오른쪽 벽 (R)</text>
    <text x="105" y="251">앞벽 (FRONT · h 30mm)</text>
  </g>

  <!-- Cube cell labels (2 columns × 3 rows, each ~55×54.7mm holding a 50mm cube) -->
  <g font-family="sans-serif" font-size="3.6" fill="#cfcfcf" text-anchor="middle">
    <text x="77.5"  y="98">50mm 큐브</text>
    <text x="132.5" y="98">50mm 큐브</text>
    <text x="77.5"  y="152">50mm 큐브</text>
    <text x="132.5" y="152">50mm 큐브</text>
    <text x="77.5"  y="206">50mm 큐브</text>
    <text x="132.5" y="206">50mm 큐브</text>
  </g>

  <!-- Floor header (subtle) -->
  <text x="105" y="77" text-anchor="middle" font-family="sans-serif" font-size="3" fill="#cfcfcf">바닥 FLOOR  110 × 164 mm  (2 열 × 3 행 · 큐브당 약 4~5mm 여유)</text>

  <!-- Assembly note -->
  <text x="105" y="272" text-anchor="middle" font-family="sans-serif" font-size="3.2" fill="#666">
    완성 트레이 내측: 110 × 164 × 30mm  ·  50mm 큐브 6개 수납 (2×3)  ·  탭 깊이 7mm
  </text>
  <text x="105" y="278" text-anchor="middle" font-family="sans-serif" font-size="2.9" fill="#888">
    조립: 4면 벽을 위로 접고, 앞·뒷벽의 좌·우 탭을 좌·우 벽 안쪽에 풀칠해 붙입니다.
  </text>

  <!-- 50mm scale bar for verification -->
  <g transform="translate(80,288)">
    <line x1="0"  y1="0"    x2="50" y2="0"    stroke="#333" stroke-width="0.4"/>
    <line x1="0"  y1="-1.5" x2="0"  y2="1.5"  stroke="#333" stroke-width="0.4"/>
    <line x1="50" y1="-1.5" x2="50" y2="1.5"  stroke="#333" stroke-width="0.4"/>
    <text x="25" y="-2.5" text-anchor="middle" font-family="sans-serif" font-size="3" fill="#333">50 mm (스케일 확인용)</text>
  </g>
</svg>
