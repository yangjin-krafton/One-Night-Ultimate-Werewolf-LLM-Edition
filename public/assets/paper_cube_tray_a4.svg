<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="210mm" height="297mm" viewBox="0 0 210 297">
  <defs>
    <pattern id="tabPattern" patternUnits="userSpaceOnUse" width="2.5" height="2.5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="2.5" stroke="#bbb" stroke-width="0.25"/>
    </pattern>
  </defs>

  <!-- Title / Instructions -->
  <text x="105" y="18" text-anchor="middle" font-family="sans-serif" font-size="5" fill="#222" font-weight="bold">A4 종이 큐브 수납 트레이 도안 — 50mm 큐브 6개(2×3) 수납용</text>
  <text x="105" y="26" text-anchor="middle" font-family="sans-serif" font-size="3.4" fill="#555">실선(검정) = 자르기 · 점선 = 접기(계곡 접기) · 빗금 영역 = 풀칠</text>
  <text x="105" y="32" text-anchor="middle" font-family="sans-serif" font-size="3.4" fill="#555">인쇄 설정: 배율 100% / 실제 크기로 (Fit to page · 페이지에 맞춤 해제)</text>
  <text x="105" y="38" text-anchor="middle" font-family="sans-serif" font-size="3.2" fill="#888">두께 180~220g/㎡ 종이 권장 · 큐브 50×50×50mm 기준 · 상단 오픈 트레이</text>

  <!-- GLUE TABS (hatched fill) -->
  <g fill="url(#tabPattern)" stroke="none">
    <!-- Back wall left + right tabs -->
    <polygon points="54,45 47,52 47,68 54,75"/>
    <polygon points="156,45 163,52 163,68 156,75"/>
    <!-- Front wall left + right tabs -->
    <polygon points="54,227 47,234 47,250 54,257"/>
    <polygon points="156,227 163,234 163,250 156,257"/>
  </g>

  <!-- CUT outline (single closed path, clockwise from back-wall TL) -->
  <path d="M 54,45 L 156,45 L 163,52 L 163,68 L 156,75 L 186,75 L 186,227 L 156,227 L 163,234 L 163,250 L 156,257 L 54,257 L 47,250 L 47,234 L 54,227 L 24,227 L 24,75 L 54,75 L 47,68 L 47,52 Z"
    fill="none" stroke="black" stroke-width="0.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- FOLD lines (dashed) -->
  <g fill="none" stroke="#333" stroke-width="0.3" stroke-dasharray="2,1.5">
    <!-- Floor-to-wall folds (4 sides) -->
    <line x1="54"  y1="75"  x2="156" y2="75"/>
    <line x1="54"  y1="227" x2="156" y2="227"/>
    <line x1="54"  y1="75"  x2="54"  y2="227"/>
    <line x1="156" y1="75"  x2="156" y2="227"/>
    <!-- Tab-to-wall folds (back wall left + right) -->
    <line x1="54"  y1="45"  x2="54"  y2="75"/>
    <line x1="156" y1="45"  x2="156" y2="75"/>
    <!-- Tab-to-wall folds (front wall left + right) -->
    <line x1="54"  y1="227" x2="54"  y2="257"/>
    <line x1="156" y1="227" x2="156" y2="257"/>
  </g>

  <!-- Cube position guides on floor (light, non-cut) -->
  <g fill="none" stroke="#d8d8d8" stroke-width="0.2" stroke-dasharray="1,1">
    <!-- Horizontal cube boundaries (row dividers inside floor) -->
    <line x1="55"  y1="126" x2="155" y2="126"/>
    <line x1="55"  y1="176" x2="155" y2="176"/>
    <!-- Vertical cube boundary (column divider inside floor) -->
    <line x1="105" y1="76"  x2="105" y2="226"/>
  </g>

  <!-- Wall labels -->
  <g font-family="sans-serif" font-size="4" fill="#aaa" text-anchor="middle">
    <text x="105" y="63">뒷벽 (BACK · h 30mm)</text>
    <text x="39"  y="153">왼쪽 벽 (L)</text>
    <text x="171" y="153">오른쪽 벽 (R)</text>
    <text x="105" y="245">앞벽 (FRONT · h 30mm)</text>
  </g>

  <!-- Cube cell labels (2 columns × 3 rows, each 50×50mm) -->
  <g font-family="sans-serif" font-size="3.6" fill="#cfcfcf" text-anchor="middle">
    <text x="80"  y="103">50 × 50</text>
    <text x="130" y="103">50 × 50</text>
    <text x="80"  y="153">50 × 50</text>
    <text x="130" y="153">50 × 50</text>
    <text x="80"  y="203">50 × 50</text>
    <text x="130" y="203">50 × 50</text>
  </g>

  <!-- Floor header (subtle) -->
  <text x="105" y="82" text-anchor="middle" font-family="sans-serif" font-size="3" fill="#cfcfcf">바닥 FLOOR  102 × 152 mm  (2 열 × 3 행)</text>

  <!-- Assembly note -->
  <text x="105" y="265" text-anchor="middle" font-family="sans-serif" font-size="3.2" fill="#666">
    완성 트레이 내측: 102 × 152 × 30mm  ·  큐브 6개 수납 (2×3)  ·  탭 깊이 7mm
  </text>
  <text x="105" y="271" text-anchor="middle" font-family="sans-serif" font-size="2.9" fill="#888">
    조립: 4면 벽을 위로 접고, 앞·뒷벽의 좌·우 탭을 좌·우 벽 안쪽에 풀칠해 붙입니다.
  </text>

  <!-- 50mm scale bar for verification -->
  <g transform="translate(80,283)">
    <line x1="0"  y1="0"    x2="50" y2="0"    stroke="#333" stroke-width="0.4"/>
    <line x1="0"  y1="-1.5" x2="0"  y2="1.5"  stroke="#333" stroke-width="0.4"/>
    <line x1="50" y1="-1.5" x2="50" y2="1.5"  stroke="#333" stroke-width="0.4"/>
    <text x="25" y="-2.5" text-anchor="middle" font-family="sans-serif" font-size="3" fill="#333">50 mm (스케일 확인용)</text>
  </g>
</svg>
