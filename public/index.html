<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>One Night Ultimate Werewolf (LAN)</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app" class="app">
      <header class="topbar">
        <div class="phase">
          <span class="phase__dot" id="connDot" title="connection"></span>
          <span class="phase__label" id="phaseLabel">WAIT</span>
          <span class="phase__meta" id="scenarioLabel"></span>
        </div>
        <div class="timer" id="timer">--:--</div>
      </header>

      <main class="main">
        <section class="join" id="join">
          <div class="landing">
            <div class="landing__content">
              <div class="landing__visual">
                <div class="landing__moon"></div>
                <div class="landing__fog"></div>
              </div>
              <h1 class="landing__title">
                <span class="font-serif">한밤의</span><br />
                <span class="font-serif">늑대인간</span>
              </h1>
              <p class="landing__subtitle">LLM Edition</p>
            </div>

            <div class="landing__action">
              <div class="landing__input-group">
                <input id="nameInput" class="landing__input" maxlength="10" placeholder="당신의 이름은?" autocomplete="off" />
                <div class="landing__input-border"></div>
              </div>
              <button class="landing__btn" id="joinBtn">입장하기</button>
              <div class="landing__hint">
                Debug: <code>?debugClientId=U1&amp;debugName=Alice</code>
              </div>
            </div>
          </div>
        </section>

        <section class="room hidden" id="room">
          <div class="grid" id="grid"></div>

          <div class="actionbar" id="actionbar">
            <button class="btn" id="scenarioBtn">시나리오 선택</button>
            <button class="btn btn--primary" id="startBtn">게임 시작</button>
            <button class="btn hidden" id="voteBtn">투표</button>
          </div>
        </section>
      </main>

      <div class="nightOverlay hidden" id="nightOverlay" aria-live="polite">
        <div class="nightOverlay__panel">
          <div class="nightOverlay__title" id="nightTitle">NIGHT</div>
          <div class="nightOverlay__role" id="nightRole"></div>
          <div class="nightOverlay__hint" id="nightHint"></div>
        </div>
      </div>

      <div class="modal hidden" id="scenarioModal" role="dialog" aria-modal="true">
        <div class="modal__backdrop" id="scenarioBackdrop"></div>
        <div class="modal__panel">
          <div class="modal__header">
            <div>
              <div class="modal__title">시나리오</div>
              <div class="modal__subtitle">호스트만 선택할 수 있어요</div>
            </div>
            <button class="iconbtn" id="scenarioClose" aria-label="close">✕</button>
          </div>
          <div class="modal__body">
            <div class="scenarioList" id="scenarioList"></div>
          </div>
        </div>
      </div>

      <div class="modal hidden" id="voteModal" role="dialog" aria-modal="true">
        <div class="modal__backdrop" id="voteBackdrop"></div>
        <div class="modal__panel">
          <div class="modal__header">
            <div>
              <div class="modal__title">투표</div>
              <div class="modal__subtitle">가장 의심스러운 좌석을 선택하세요</div>
            </div>
            <button class="iconbtn" id="voteClose" aria-label="close">✕</button>
          </div>
          <div class="modal__body">
            <div class="voteGrid" id="voteGrid"></div>
          </div>
        </div>
      </div>

      <div id="transitionLayer" class="transition-layer"></div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
