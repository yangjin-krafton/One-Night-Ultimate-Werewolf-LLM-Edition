<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>One Night Ultimate Werewolf (LAN)</title>
    <base href="./" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app" class="app">
      <header class="topbar">
        <div class="phase">
          <span class="phase__dot" id="connDot" title="connection"></span>
          <span class="phase__label" id="phaseLabel">WAIT</span>
          <span class="phase__meta" id="scenarioLabel"></span>
        </div>
        <div class="timer" id="timer">--:--</div>
      </header>

      <main class="main">
        <section class="join" id="join">
          <div class="landing">
            <div class="landing__content">
              <div class="landing__visual">
                <div class="landing__moon"></div>
                <div class="landing__fog"></div>
              </div>
              <h1 class="landing__title">
                <span class="font-serif">한밤의</span><br />
                <span class="font-serif">늑대인간</span>
              </h1>
              <p class="landing__subtitle">LLM Edition</p>
            </div>

            <div class="landing__action">
              <div class="landing__avatar-wrapper">
                <div id="avatarPreview" class="landing__avatar">👻</div>
                <button id="avatarBtn" class="landing__avatar-btn" aria-label="Change Avatar">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38"/></svg>
                </button>
              </div>

              <div class="landing__input-group">
                <input id="nameInput" class="landing__input" maxlength="10" placeholder="당신의 이름은?" autocomplete="off" />
                <div class="landing__input-border"></div>
              </div>
              <button class="landing__btn btn btn--cta" id="joinBtn">입장하기</button>
              <div class="landing__hint">
                Debug: <code>?debugClientId=U1&amp;debugName=Alice</code>
              </div>
            </div>
          </div>
        </section>

        <section class="room hidden" id="room">
          <div class="room__top">
            <div class="grid" id="grid"></div>
          </div>
          
          <div class="room__bottom">
            <div class="roleStrip hidden" id="roleStrip"></div>
            <div class="info-deck" id="infoDeck">
              <!-- Cards will be injected by JS -->
              <div class="info-card placeholder">
                <div class="info-card__content">
                  <h3>대기 중...</h3>
                  <p>호스트가 시나리오를 선택하고 있습니다.</p>
                </div>
              </div>
            </div>
            <div class="deck-indicators" id="deckIndicators"></div>
          </div>

          <div class="actionbar" id="actionbar">
            <button class="btn hidden" id="rerollBtn">🎨 내 컬러 변경</button>
            <button class="btn hidden" id="scenarioBtn">시나리오 선택</button>
            <button class="btn hidden" id="waitForActionsBtn" title="역할 행동 후 '눈 감기' 멘트를 분리해, 행동 완료→눈 감기 안내→다음 역할 순서로 진행합니다.">
              액션 수행 기다림: OFF
            </button>
            <button class="btn btn--primary hidden" id="startBtn">게임 시작</button>
            <button class="btn hidden" id="voteBtn">투표</button>
            <button class="btn hidden" id="leaveBtn">나가기</button>
          </div>
        </section>
      </main>

      <button class="hostEndBtn hidden" id="hostEndBtn">게임 종료</button>

      <div class="nightOverlay hidden" id="roleOverlay" aria-live="polite">
        <div class="nightOverlay__panel">
          <div class="nightOverlay__title" id="roleTitle">ROLE</div>
          <div class="nightOverlay__role" id="roleName"></div>
          <div class="nightOverlay__hint" id="roleDesc"></div>
          <div class="nightOverlay__body">
            <div class="nightOverlay__active" id="roleProfile"></div>
            <div class="nightOverlay__action" id="roleAction">
              <div class="roleAction__text" id="roleActionText"></div>
              <button class="btn btn--cta btn--xl" id="eyesClosedBtn">휴대폰 화면을 다른 사람이 보이게 내려놓고, 눈을 감아요</button>
            </div>
          </div>
        </div>
      </div>

      <div class="nightOverlay hidden" id="nightOverlay" aria-live="polite">
        <div class="nightOverlay__panel">
          <div class="nightOverlay__title" id="nightTitle">NIGHT</div>
          <div class="nightOverlay__role" id="nightRole"></div>
          <div class="nightOverlay__hint" id="nightHint"></div>
          <div class="nightOverlay__body" id="nightBody">
            <div class="nightOverlay__active" id="nightActive"></div>
            <div class="nightOverlay__private hidden" id="nightPrivate"></div>
            <div class="nightOverlay__action hidden" id="nightAction"></div>
          </div>
        </div>
      </div>

      <div class="modal hidden" id="scenarioModal" role="dialog" aria-modal="true">
        <div class="modal__backdrop" id="scenarioBackdrop"></div>
        <div class="modal__panel">
          <div class="modal__header">
            <div>
              <div class="modal__title">시나리오</div>
              <div class="modal__subtitle">호스트만 선택할 수 있어요</div>
            </div>
            <button class="iconbtn" id="scenarioClose" aria-label="close">✕</button>
          </div>
          <div class="modal__body">
            <div class="scenarioList" id="scenarioList"></div>

            <div class="episodePicker hidden" id="episodePicker">
              <div class="episodePicker__top">
                <button class="btn btn--ghost" id="episodeBack">← 시나리오</button>
                <div class="episodePicker__title" id="episodePickerTitle">에피소드 선택</div>
              </div>
              <div class="episodeList" id="episodeList"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal hidden" id="voteModal" role="dialog" aria-modal="true">
        <div class="modal__backdrop" id="voteBackdrop"></div>
        <div class="modal__panel">
          <div class="modal__header">
            <div>
              <div class="modal__title">투표</div>
              <div class="modal__subtitle">가장 의심스러운 좌석을 선택하세요</div>
            </div>
            <button class="iconbtn" id="voteClose" aria-label="close">✕</button>
          </div>
          <div class="modal__body">
            <div class="voteGrid" id="voteGrid"></div>
          </div>
        </div>
      </div>

      <div class="modal hidden" id="voteResultModal" role="dialog" aria-modal="true">
        <div class="modal__backdrop" id="voteResultBackdrop"></div>
        <div class="modal__panel">
          <div class="modal__header">
            <div>
              <div class="modal__title" id="voteResultTitle">투표 결과</div>
              <div class="modal__subtitle" id="voteResultSubtitle"></div>
            </div>
            <button class="iconbtn" id="voteResultClose" aria-label="close">✕</button>
          </div>
          <div class="modal__body">
            <div class="voteResultWinners" id="voteResultWinners"></div>
            <div class="voteResultGrid" id="voteResultGrid"></div>
          </div>
        </div>
      </div>

      <div class="modal hidden" id="lobbyNoticeModal" role="dialog" aria-modal="true">
        <div class="modal__backdrop" id="lobbyNoticeBackdrop"></div>
        <div class="modal__panel">
          <div class="modal__header">
            <div>
              <div class="modal__title" id="lobbyNoticeTitle"></div>
              <div class="modal__subtitle" id="lobbyNoticeSubtitle"></div>
            </div>
            <button class="iconbtn" id="lobbyNoticeClose" aria-label="close">✕</button>
          </div>
          <div class="modal__body" id="lobbyNoticeBody"></div>
        </div>
      </div>

      <div id="transitionLayer" class="transition-layer"></div>
    </div>

    <script src="vendor/gsap.min.js"></script>
    <script src="ui/text_highlight.js"></script>
    <script src="ui/buttons.js"></script>
    <script src="ui/cards.js"></script>
    <script src="ui/night_board.js"></script>
    <script src="app.js"></script>
  </body>
</html>
