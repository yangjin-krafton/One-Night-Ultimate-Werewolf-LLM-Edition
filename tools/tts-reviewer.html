<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTS Voice Reviewer</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222e;
    --border: #2e2e3e;
    --text: #e0e0e8;
    --text-dim: #888898;
    --accent: #7c6aef;
    --accent-hover: #9584ff;
    --green: #4ade80;
    --red: #f87171;
    --orange: #fb923c;
    --blue: #60a5fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 18px; font-weight: 600; white-space: nowrap; }
  .selector-group { display: flex; align-items: center; gap: 8px; }
  .selector-group label { font-size: 13px; color: var(--text-dim); white-space: nowrap; }
  select {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; font-size: 14px; cursor: pointer; outline: none;
  }
  select:hover { border-color: var(--accent); }

  .server-config {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
  }
  .server-config input {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-size: 13px; width: 340px; outline: none;
  }
  .server-config input:focus { border-color: var(--accent); }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--text-dim); flex-shrink: 0;
  }
  .status-dot.ok { background: var(--green); }
  .status-dot.err { background: var(--red); }

  /* ── Folder picker banner ── */
  .folder-banner {
    background: var(--surface2);
    border: 2px dashed var(--accent);
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    margin: 60px auto;
    max-width: 600px;
  }
  .folder-banner h2 { font-size: 20px; margin-bottom: 12px; }
  .folder-banner p { font-size: 14px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.6; }
  .folder-banner .btn { font-size: 16px; padding: 12px 28px; }
  .mode-badge {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
  }
  .mode-badge.local { border-color: var(--green); color: var(--green); }
  .mode-badge.http { border-color: var(--blue); color: var(--blue); }

  /* ── Main ── */
  main { max-width: 1200px; margin: 0 auto; padding: 24px; }

  .stats-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 16px; font-size: 13px;
    display: flex; align-items: center; gap: 6px;
  }
  .stat-chip .num { font-weight: 700; font-size: 16px; }

  .clip-section-header {
    background: var(--accent); color: #fff;
    padding: 8px 16px; font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    border-radius: 6px 6px 0 0; margin-top: 16px;
  }
  .clip-section-header:first-child { margin-top: 0; }

  .clip-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 14px 16px;
    display: grid; grid-template-columns: 36px 130px 1fr auto;
    gap: 12px; align-items: start; transition: background 0.15s;
  }
  .clip-card:hover { background: var(--surface2); }
  .clip-card.playing { border-left: 3px solid var(--accent); }
  .clip-card.modified { border-left: 3px solid var(--orange); }
  .clip-card.regenerating { border-left: 3px solid var(--blue); opacity: 0.7; }

  .clip-index { font-size: 12px; color: var(--text-dim); text-align: center; padding-top: 2px; }
  .clip-speaker { display: flex; flex-direction: column; gap: 2px; }
  .clip-speaker .role-name { font-size: 14px; font-weight: 600; color: var(--accent); }
  .clip-speaker .voice-tag { font-size: 11px; color: var(--text-dim); }
  .voice-tag-input {
    background: var(--bg); color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 2px 6px; font-size: 11px; width: 120px; outline: none;
  }
  .voice-tag-input:focus { border-color: var(--accent); color: var(--text); }

  .clip-body { display: flex; flex-direction: column; gap: 8px; }
  .clip-text { font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
  .clip-text-edit {
    display: none; width: 100%; min-height: 80px;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--accent); border-radius: 6px;
    padding: 10px; font-size: 14px; line-height: 1.6;
    font-family: inherit; resize: vertical; outline: none;
  }
  .clip-actions {
    display: flex; flex-direction: column; gap: 6px;
    align-items: flex-end; min-width: 120px;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px; border: 1px solid var(--border);
    border-radius: 6px; background: var(--surface2);
    color: var(--text); font-size: 12px; cursor: pointer;
    white-space: nowrap; transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent-hover); }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: var(--red); color: #fff; }
  .btn-sm { padding: 4px 8px; font-size: 11px; }

  .queue-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 16px;
    z-index: 100; transform: translateY(100%); transition: transform 0.3s;
  }
  .queue-panel.visible { transform: translateY(0); }
  .queue-panel .queue-info { font-size: 13px; flex: 1; }
  .queue-panel .queue-info strong { color: var(--accent); }
  .queue-progress { width: 200px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .queue-progress-bar { height: 100%; background: var(--accent); border-radius: 3px; width: 0%; transition: width 0.3s; }
  .queue-log { max-height: 60px; overflow-y: auto; font-size: 11px; color: var(--text-dim); flex: 1; font-family: 'Consolas', monospace; }

  .playback-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 2px solid var(--accent);
    padding: 10px 24px; display: flex; align-items: center; gap: 12px;
    z-index: 99; transform: translateY(100%); transition: transform 0.3s;
  }
  .playback-bar.visible { transform: translateY(0); }
  .playback-bar .now-playing { font-size: 13px; flex-shrink: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .playback-bar .now-playing .role { color: var(--accent); font-weight: 600; }
  .playback-bar audio { flex: 1; min-width: 200px; max-width: 480px; height: 36px; }

  .toast-container { position: fixed; top: 80px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 16px; font-size: 13px;
    animation: toastIn 0.3s, toastOut 0.3s 2.7s; max-width: 400px;
  }
  .toast.error { border-color: var(--red); color: var(--red); }
  .toast.success { border-color: var(--green); color: var(--green); }
  @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } }
  @keyframes toastOut { to { opacity: 0; transform: translateX(20px); } }

  .loading { text-align: center; padding: 60px; color: var(--text-dim); font-size: 14px; }
  .spinner {
    width: 24px; height: 24px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.6s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Voice Map Panel ── */
  .vmpanel-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 300; display: none;
  }
  .vmpanel-overlay.open { display: block; }
  .vmpanel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(640px, 90vw); background: var(--bg);
    border-left: 1px solid var(--border);
    z-index: 301; display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform 0.3s;
  }
  .vmpanel.open { transform: translateX(0); }
  .vmpanel-header {
    padding: 16px 20px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .vmpanel-header h2 { font-size: 16px; flex: 1; }
  .vmpanel-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .vmpanel-footer {
    padding: 12px 20px; background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
  }

  .vm-search {
    width: 100%; background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 12px; font-size: 13px; outline: none; margin-bottom: 12px;
  }
  .vm-search:focus { border-color: var(--accent); }

  .vm-role-row {
    display: grid; grid-template-columns: 130px 1fr auto;
    gap: 10px; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .vm-role-name { font-size: 13px; font-weight: 600; }
  .vm-role-id { font-size: 10px; color: var(--text-dim); }
  .vm-voice-select {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 8px; font-size: 13px; outline: none; width: 100%;
  }
  .vm-voice-select:focus { border-color: var(--accent); }
  .vm-preview-btn {
    padding: 4px 10px; font-size: 11px; cursor: pointer;
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    white-space: nowrap;
  }
  .vm-preview-btn:hover { border-color: var(--accent); color: var(--accent); }
  .vm-preview-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .vm-preview-btn.loading { color: var(--blue); border-color: var(--blue); }

  .vm-section-title {
    font-size: 12px; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.5px; padding: 12px 0 6px; border-bottom: 2px solid var(--accent);
    margin-top: 8px;
  }
  .vm-voice-count { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }

  /* ── Voice Browser (hover-to-play grid) ── */
  .vb-container {
    border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 16px; overflow: hidden;
  }
  .vb-header {
    background: var(--surface); padding: 8px 12px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border); cursor: pointer;
  }
  .vb-header:hover { background: var(--surface2); }
  .vb-header h3 { font-size: 13px; flex: 1; }
  .vb-search {
    width: 100%; background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 6px 10px; font-size: 12px; outline: none;
    margin: 8px 12px; width: calc(100% - 24px);
  }
  .vb-search:focus { border-color: var(--accent); }
  .vb-grid {
    display: flex; flex-wrap: wrap; gap: 4px;
    padding: 8px 12px; max-height: 240px; overflow-y: auto;
  }
  .vb-chip {
    padding: 4px 10px; font-size: 11px;
    color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 14px;
    cursor: pointer; transition: all 0.12s; white-space: nowrap;
  }
  .vb-chip:hover {
    border-color: #fff; transform: scale(1.08);
    filter: brightness(1.25);
  }
  .vb-chip.playing {
    border-color: #fff; transform: scale(1.08);
    box-shadow: 0 0 8px rgba(124,106,239,0.6);
    filter: brightness(1.3);
  }
  .vb-assign-bar {
    background: var(--surface); padding: 6px 12px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-dim);
  }
  .vb-assign-bar select {
    font-size: 12px; padding: 3px 6px;
  }

  /* ── Voice Chip → Role Picker Popup ── */
  .vb-role-picker {
    position: fixed; z-index: 350;
    background: var(--bg); border: 2px solid var(--accent);
    border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    width: 260px; max-height: 360px;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .vb-role-picker-header {
    padding: 10px 14px; background: var(--accent); color: #fff;
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: space-between;
  }
  .vb-role-picker-header .close-btn {
    background: none; border: none; color: #fff; font-size: 16px; cursor: pointer; padding: 0 4px;
  }
  .vb-role-picker-list { overflow-y: auto; flex: 1; }
  .vb-role-picker-item {
    padding: 8px 14px; font-size: 13px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border); transition: background 0.1s;
  }
  .vb-role-picker-item:hover { background: var(--surface2); }
  .vb-role-picker-item .role-label { font-weight: 600; }
  .vb-role-picker-item .cur-voice {
    font-size: 10px; color: var(--text-dim); max-width: 100px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .vb-role-picker-item.same-voice .cur-voice { color: var(--green); }
  .vb-role-picker-backdrop {
    position: fixed; inset: 0; z-index: 349; background: transparent;
  }

  /* ── Confirm Dialog ── */
  .confirm-overlay {
    position: fixed; inset: 0; z-index: 400;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
  }
  .confirm-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; min-width: 320px; max-width: 420px;
  }
  .confirm-box h3 { font-size: 15px; margin-bottom: 10px; }
  .confirm-box p { font-size: 13px; color: var(--text-dim); margin-bottom: 18px; line-height: 1.5; }
  .confirm-box .actions { display: flex; gap: 8px; justify-content: flex-end; }

  @media (max-width: 800px) {
    .clip-card { grid-template-columns: 1fr; gap: 8px; }
    .clip-actions { flex-direction: row; flex-wrap: wrap; min-width: unset; }
    header { flex-direction: column; align-items: flex-start; }
    .server-config { margin-left: 0; }
    .server-config input { width: 100%; }
    .vmpanel { width: 100vw; }
    .vm-role-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>TTS Voice Reviewer</h1>
  <span class="mode-badge" id="modeBadge">--</span>
  <div class="selector-group" id="selectorGroup" style="display:none">
    <label>Scenario</label>
    <select id="selScenario"><option value="">-- loading --</option></select>
  </div>
  <div class="selector-group" id="episodeGroup" style="display:none">
    <label>Episode</label>
    <select id="selEpisode"><option value="">--</option></select>
  </div>
  <div class="selector-group" id="playGroup" style="display:none">
    <button class="btn" id="btnPlayAll" disabled>&#9654; 전체 재생</button>
    <button class="btn" id="btnStopAll" disabled>&#9632; 정지</button>
    <button class="btn primary" id="btnRegenAll" onclick="regenAllClips()" disabled>&#9889; 전체 재생성</button>
    <button class="btn" id="btnVoiceMap" onclick="openVoiceMapPanel()">Voice Map</button>
  </div>
  <div class="server-config">
    <span class="status-dot" id="serverStatus" title="TTS 서버 상태"></span>
    <input id="ttsApiBase" type="text" placeholder="TTS API Base URL"
           value="http://100.66.65.124:8080">
    <button class="btn btn-sm" id="btnPing">연결 확인</button>
    <span style="margin-left:8px;font-size:11px;color:var(--text-dim)">|</span>
    <span class="status-dot" id="convertStatus" title="변환 서버 상태"></span>
    <input id="convertApiBase" type="text" placeholder="변환 서버"
           value="http://localhost:3457" style="width:180px">
    <span id="convertLabel" style="font-size:11px;color:var(--text-dim)">M4A 변환</span>
  </div>
</header>

<main>
  <div class="stats-bar" id="statsBar"></div>
  <div id="clipContainer">
    <!-- folder picker banner or clip list -->
  </div>
</main>

<div class="playback-bar" id="playbackBar">
  <button class="btn btn-sm" id="pbPrev">&#9664;&#9664;</button>
  <audio id="audioPlayer" controls></audio>
  <button class="btn btn-sm" id="pbNext">&#9654;&#9654;</button>
  <div class="now-playing" id="pbNowPlaying">--</div>
</div>

<div class="queue-panel" id="queuePanel">
  <div class="queue-info">
    재생성 큐: <strong id="queueCount">0</strong>개 대기 / <strong id="queueDone">0</strong>개 완료
  </div>
  <div class="queue-progress"><div class="queue-progress-bar" id="queueProgressBar"></div></div>
  <button class="btn primary btn-sm" id="btnRunQueue" disabled>큐 실행</button>
  <button class="btn danger btn-sm" id="btnClearQueue">큐 초기화</button>
  <div class="queue-log" id="queueLog"></div>
</div>

<!-- Voice Map Panel -->
<div class="vmpanel-overlay" id="vmOverlay" onclick="closeVoiceMapPanel(false)"></div>
<div class="vmpanel" id="vmPanel">
  <div class="vmpanel-header">
    <h2>Voice Map Editor</h2>
    <span class="vm-voice-count" id="vmVoiceCount">--</span>
    <button class="btn btn-sm" onclick="fetchServerVoices()">&#128193; 음성 라이브러리 폴더</button>
    <button class="btn btn-sm" onclick="closeVoiceMapPanel(false)">&#10005;</button>
  </div>
  <div class="vmpanel-body" id="vmBody">
    <!-- Voice Browser: hover-to-play -->
    <div class="vb-container" id="vbContainer">
      <div class="vb-header" onclick="$('vbBody').style.display = $('vbBody').style.display === 'none' ? '' : 'none'">
        <h3>Voice Browser (hover-to-play)</h3>
        <span style="font-size:11px;color:var(--text-dim)" id="vbCount">0</span>
      </div>
      <div id="vbBody">
        <input class="vb-search" id="vbSearch" type="text" placeholder="음성 이름 검색..." oninput="renderVoiceBrowser()">
        <div class="vb-grid" id="vbGrid"></div>
        <div class="vb-assign-bar">
          <span>hover = 미리듣기 | 클릭 = 역할에 할당</span>
          <span id="vbNowPlaying" style="margin-left:auto;color:var(--accent)"></span>
        </div>
      </div>
    </div>

    <!-- Role mapping list -->
    <input class="vm-search" id="vmSearch" type="text" placeholder="역할 또는 음성 검색...">
    <div id="vmRoleList"></div>
  </div>
  <div class="vmpanel-footer">
    <button class="btn" onclick="closeVoiceMapPanel(false)">닫기</button>
    <button class="btn primary" id="btnVmSave" onclick="saveVoiceMap()">voice_map.json 저장</button>
  </div>
</div>

<!-- Role Picker Popup (for voice chip click) -->
<div class="vb-role-picker" id="vbRolePicker" style="display:none"></div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ============================================================================
// State
// ============================================================================
const SCENARIOS = [
  'beginner_dark_fantasy','dark_citadel','floodgate_nameplates',
  'rust_orbit','salgol_ward','school_broadcast_prayer',
];

let scenarioData = null;
let manifestData = null;
let voiceMap = null;
let currentClips = [];
let playingIdx = -1;
let isPlayAll = false;
let regenQueue = [];
let regenRunning = false;
let voiceMapDirty = false;    // voice map changed since last save?
let voiceMapOriginal = null;  // snapshot for dirty detection

// ── File System Access API (local mode) ──
let projectDirHandle = null;  // FileSystemDirectoryHandle
let voiceLibDirHandle = null; // FileSystemDirectoryHandle for voice library
let voicesJsonData = [];      // parsed voices.json entries
const audioBlobCache = {};    // url → blobUrl

const isFileProtocol = location.protocol === 'file:';

// ── localStorage persistence ──
const LS_PREFIX = 'tts-reviewer:';
function lsGet(key, fallback) { try { const v = localStorage.getItem(LS_PREFIX + key); return v !== null ? v : fallback; } catch { return fallback; } }
function lsSet(key, val) { try { localStorage.setItem(LS_PREFIX + key, val); } catch {} }
function lsGetJson(key, fallback) { try { const v = localStorage.getItem(LS_PREFIX + key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } }
function lsSetJson(key, val) { try { localStorage.setItem(LS_PREFIX + key, JSON.stringify(val)); } catch {} }

// ── IndexedDB for FileSystemDirectoryHandle persistence ──
const IDB_NAME = 'tts-reviewer-handles';
const IDB_STORE = 'handles';

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbSave(key, handle) {
  try {
    const db = await idbOpen();
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(handle, key);
    await new Promise((r, j) => { tx.oncomplete = r; tx.onerror = j; });
    db.close();
  } catch {}
}

async function idbLoad(key) {
  try {
    const db = await idbOpen();
    const tx = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    const result = await new Promise((r, j) => { req.onsuccess = () => r(req.result); req.onerror = j; });
    db.close();
    return result || null;
  } catch { return null; }
}

async function reRequestPermission(handle, mode) {
  if (!handle) return false;
  try {
    if ((await handle.queryPermission({ mode })) === 'granted') return true;
    return (await handle.requestPermission({ mode })) === 'granted';
  } catch { return false; }
}

// ============================================================================
// File System Access API helpers (for file:// mode)
// ============================================================================
async function getSubDir(dirHandle, pathParts) {
  let h = dirHandle;
  for (const part of pathParts) {
    h = await h.getDirectoryHandle(part);
  }
  return h;
}

async function readJsonFromDir(dirHandle, relativePath) {
  const parts = relativePath.replace(/\\/g, '/').split('/').filter(Boolean);
  const fileName = parts.pop();
  const dir = parts.length > 0 ? await getSubDir(dirHandle, parts) : dirHandle;
  const fileHandle = await dir.getFileHandle(fileName);
  const file = await fileHandle.getFile();
  const text = await file.text();
  return JSON.parse(text);
}

async function readFileBlobUrl(dirHandle, relativePath) {
  if (audioBlobCache[relativePath]) return audioBlobCache[relativePath];
  try {
    const parts = relativePath.replace(/\\/g, '/').split('/').filter(Boolean);
    const fileName = parts.pop();
    const dir = parts.length > 0 ? await getSubDir(dirHandle, parts) : dirHandle;
    const fileHandle = await dir.getFileHandle(fileName);
    const file = await fileHandle.getFile();
    const url = URL.createObjectURL(file);
    audioBlobCache[relativePath] = url;
    return url;
  } catch {
    return null;
  }
}

// Data Loading (dual mode: fetch vs FileSystemAccess)
// ============================================================================
async function loadVoiceMap() {
  try {
    if (projectDirHandle) {
      voiceMap = await readJsonFromDir(projectDirHandle, 'characters/voice_map.json');
    } else {
      const resp = await fetch(`${basePath()}/characters/voice_map.json`);
      if (resp.ok) voiceMap = await resp.json();
    }
    voiceMapOriginal = voiceMap ? JSON.stringify(voiceMap) : null;
    voiceMapDirty = false;
  } catch { /* ignore */ }
}

async function loadScenario(scenarioId) {
  if (projectDirHandle) {
    return readJsonFromDir(projectDirHandle, `public/assets/scenarios_tts/${scenarioId}.tts.json`);
  }
  const resp = await fetch(`${basePath()}/public/assets/scenarios_tts/${scenarioId}.tts.json`);
  if (!resp.ok) throw new Error(`Failed to load scenario: ${resp.status}`);
  return resp.json();
}

async function loadManifest(scenarioId) {
  try {
    if (projectDirHandle) {
      return await readJsonFromDir(projectDirHandle, `public/assets/voices/${scenarioId}/_manifest.json`);
    }
    const resp = await fetch(`${basePath()}/public/assets/voices/${scenarioId}/_manifest.json`);
    if (resp.ok) return resp.json();
  } catch { /* no manifest */ }
  return null;
}

async function resolveAudioSrc(clip) {
  if (clip.regenBlobUrl) return clip.regenBlobUrl;
  if (!clip.audioUrl) return null;

  if (projectDirHandle) {
    // audioUrl is like "/assets/voices/scenario/ep1/.../voice.m4a"
    const relPath = 'public' + clip.audioUrl;
    return readFileBlobUrl(projectDirHandle, relPath);
  }
  return `${basePath()}/public${clip.audioUrl}`;
}

// ============================================================================
// Render
// ============================================================================
function renderEpisode(episodeId) {
  stopAll();
  clearRegenQueue();

  const ep = scenarioData.episodes[episodeId];
  if (!ep) return;

  const scenarioId = scenarioData.scenarioId;
  currentClips = [];

  if (ep.openingClips) {
    currentClips.push({
      type: 'opening', speakerId: 'Narrator', roleId: 'Narrator',
      text: ep.openingClips, originalText: ep.openingClips,
      audioUrl: findAudioUrl(scenarioId, episodeId, 'opening', null)
            || `/assets/voices/${scenarioId}/${episodeId}/pall/opening/001/voice.m4a`,
    });
  }
  if (ep.roleClips) {
    for (const [roleId, text] of Object.entries(ep.roleClips)) {
      currentClips.push({
        type: 'role', speakerId: roleId, roleId,
        text, originalText: text,
        audioUrl: findAudioUrl(scenarioId, episodeId, 'role', roleId)
              || `/assets/voices/${scenarioId}/${episodeId}/pall/role/${roleId}/during/001/voice.m4a`,
      });
    }
  }
  if (ep.nightOutroClips) {
    currentClips.push({
      type: 'outro', speakerId: 'Narrator', roleId: 'Narrator',
      text: ep.nightOutroClips, originalText: ep.nightOutroClips,
      audioUrl: findAudioUrl(scenarioId, episodeId, 'outro', null)
            || `/assets/voices/${scenarioId}/${episodeId}/pall/outro/001/voice.m4a`,
    });
  }

  renderClipList();
  renderStats();
  $('btnPlayAll').disabled = false;
  $('btnStopAll').disabled = false;
  $('btnRegenAll').disabled = false;
}

function findAudioUrl(scenarioId, episodeId, clipType, roleId) {
  if (!manifestData || !manifestData.clips) return null;
  for (const c of manifestData.clips) {
    const id = c.clipId || '';
    if (!id.includes(`/${episodeId}/`)) continue;
    if (clipType === 'opening' && id.includes('/opening/')) return c.url;
    if (clipType === 'outro' && id.includes('/outro/')) return c.url;
    if (clipType === 'role' && roleId && id.includes(`/role/${roleId}/`)) return c.url;
  }
  return null;
}

function renderClipList() {
  const container = $('clipContainer');
  container.innerHTML = '';
  let lastType = '';

  currentClips.forEach((clip, idx) => {
    if (clip.type !== lastType) {
      const header = document.createElement('div');

      header.textContent = clip.type === 'opening' ? 'Opening' : clip.type === 'outro' ? 'Night Outro' : 'Role Clips';

      lastType = clip.type;
    }

    const card = document.createElement('div');
    card.className = 'clip-card';
    card.id = `clip-${idx}`;
    if (clip.text !== clip.originalText) card.classList.add('modified');

    const voiceTag = getVoiceTag(clip.roleId);
    const hasAudio = !!clip.audioUrl || !!clip.regenBlobUrl;

    card.innerHTML = `
      <div class="clip-index">#${idx + 1}</div>
      <div class="clip-speaker">
        <span class="role-name">${roleDisplayName(clip.roleId)}</span>
        <span class="voice-tag" title="Voice Tag">${escapeHtml(voiceTag)}</span>
        <input class="voice-tag-input" id="vtag-${idx}" type="text" value="${escapeHtml(voiceTag)}"
               placeholder="voice tag" title="재생성 시 사용할 voice tag (수정 가능)">
      </div>
      <div class="clip-body">
        <div class="clip-text" id="text-${idx}">${escapeHtml(clip.text)}</div>
        <textarea class="clip-text-edit" id="edit-${idx}">${escapeHtml(clip.text)}</textarea>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button class="btn btn-sm" onclick="toggleEdit(${idx})">&#9998; 편집</button>
          <button class="btn btn-sm" id="saveBtn-${idx}" style="display:none" onclick="saveEdit(${idx})">저장</button>
          <button class="btn btn-sm" id="cancelBtn-${idx}" style="display:none" onclick="cancelEdit(${idx})">취소</button>
          <button class="btn btn-sm" id="revertBtn-${idx}" style="display:none" onclick="revertEdit(${idx})">원본 복원</button>
        </div>
      </div>
      <div class="clip-actions">
        <button class="btn btn-sm" onclick="playClip(${idx})" ${!hasAudio ? 'disabled title="오디오 파일 없음"' : ''}>
          &#9654; 재생
        </button>
        <button class="btn btn-sm" onclick="addToQueue(${idx})" title="TTS 재생성 큐에 추가">
          &#8635; 큐 추가
        </button>
        <button class="btn btn-sm primary" onclick="regenNow(${idx})" title="즉시 TTS 재생성 → M4A 변환 → 자동 저장">
          &#9889; 재생성 & 저장
        </button>
        ${clip.regenBlobUrl ? `<span style="font-size:10px;color:var(--green)">&#10003; 저장됨</span>` : ''}

// Edit

function toggleEdit(idx) {
  const textEl = $(`text-${idx}`), editEl = $(`edit-${idx}`);
  if (editEl.style.display !== 'none') { cancelEdit(idx); return; }
  textEl.style.display = 'none';
  editEl.style.display = 'block';
  editEl.value = currentClips[idx].text;
  $(`saveBtn-${idx}`).style.display = '';
  $(`cancelBtn-${idx}`).style.display = '';
  $(`revertBtn-${idx}`).style.display = currentClips[idx].text !== currentClips[idx].originalText ? '' : 'none';
  editEl.focus();
}

function saveEdit(idx) {
  const newText = $(`edit-${idx}`).value.trim();
  if (!newText) return;
  currentClips[idx].text = newText;
  $(`text-${idx}`).textContent = newText;
  $(`text-${idx}`).style.display = '';
  $(`edit-${idx}`).style.display = 'none';
  $(`saveBtn-${idx}`).style.display = 'none';
  $(`cancelBtn-${idx}`).style.display = 'none';
  $(`revertBtn-${idx}`).style.display = 'none';
  const card = $(`clip-${idx}`);
  if (newText !== currentClips[idx].originalText) card.classList.add('modified');
  else card.classList.remove('modified');
  renderStats();
}

function cancelEdit(idx) {
  $(`text-${idx}`).style.display = '';
  $(`edit-${idx}`).style.display = 'none';
  $(`saveBtn-${idx}`).style.display = 'none';
  $(`cancelBtn-${idx}`).style.display = 'none';
  $(`revertBtn-${idx}`).style.display = 'none';
}

function revertEdit(idx) {
  currentClips[idx].text = currentClips[idx].originalText;
  $(`text-${idx}`).textContent = currentClips[idx].originalText;
  $(`edit-${idx}`).value = currentClips[idx].originalText;
  cancelEdit(idx);
  $(`clip-${idx}`).classList.remove('modified');
  renderStats();
}

// ============================================================================
// Audio Playback
// ============================================================================
const audioPlayer = document.getElementById('audioPlayer');

function playClip(idx) { stopAll(); isPlayAll = false; _play(idx); }

async function _play(idx) {
  if (idx < 0 || idx >= currentClips.length) { stopAll(); return; }

  const clip = currentClips[idx];
  const src = await resolveAudioSrc(clip);
  if (!src) {
    if (isPlayAll) { _play(idx + 1); } else { toast('오디오 파일이 없습니다', 'error'); }
    return;
  }

  playingIdx = idx;

  document.querySelectorAll('.clip-card.playing').forEach(el => el.classList.remove('playing'));
  const card = $(`clip-${idx}`);
  if (card) { card.classList.add('playing'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }

  $('playbackBar').classList.add('visible');
  $('pbNowPlaying').innerHTML = `<span class="role">${roleDisplayName(clip.roleId)}</span> &mdash; ${escapeHtml(clip.text.substring(0, 80))}...`;

  audioPlayer.src = src;
  audioPlayer.play().catch(() => {});
}

// Native audio ended → advance in play-all mode
audioPlayer.addEventListener('ended', () => {
  document.querySelectorAll('.clip-card.playing').forEach(el => el.classList.remove('playing'));
  if (isPlayAll) { _play(playingIdx + 1); }
  else { playingIdx = -1; $('playbackBar').classList.remove('visible'); }
});
audioPlayer.addEventListener('error', () => {
  toast(`오디오 재생 실패: clip #${playingIdx + 1}`, 'error');
  if (isPlayAll) _play(playingIdx + 1);
});

function stopAll() {
  isPlayAll = false;
  audioPlayer.pause();
  audioPlayer.removeAttribute('src');
  playingIdx = -1;
  document.querySelectorAll('.clip-card.playing').forEach(el => el.classList.remove('playing'));
  $('playbackBar').classList.remove('visible');
}

$('btnPlayAll').addEventListener('click', () => { stopAll(); isPlayAll = true; _play(0); });
$('btnStopAll').addEventListener('click', stopAll);
$('pbPrev').addEventListener('click', () => { if (playingIdx > 0) { const p = playingIdx; stopAll(); _play(p - 1); } });
$('pbNext').addEventListener('click', () => { if (playingIdx < currentClips.length - 1) { const p = playingIdx; stopAll(); _play(p + 1); } });

// ============================================================================
// TTS Regeneration (Fish Speech API)
// ============================================================================
function getApiBase() {
  const val = $('ttsApiBase').value.trim().replace(/\/+$/, '');
  lsSet('apiBase', val);
  return val;
}

// Find voice entry from voicesJsonData by tag name
function findVoiceEntry(tag) {
  if (!tag || voicesJsonData.length === 0) return null;
  return voicesJsonData.find(v => v.tag === tag) || null;
}

async function generateTts(text, speakerId, overrideTag) {
  const base = getApiBase();
  const tag = overrideTag || (voiceMap ? (voiceMap[speakerId] || voiceMap['Narrator']) : null);

  const body = {
    text,
    format: 'wav',
    temperature: 0.8,
    top_p: 0.8,
    repetition_penalty: 1.1,
    max_new_tokens: 1024,
    normalize: true,
  };
  if (tag) body.reference_id = tag;

  const resp = await fetch(`${base}/v1/tts`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  if (!resp.ok) {
    const errText = await resp.text().catch(() => resp.statusText);
    throw new Error(`TTS 실패 (${resp.status}): ${errText}`);
  }

  const blob = await resp.blob();
  return { blob, blobUrl: URL.createObjectURL(blob) };
}

function getTagOverride(idx) {
  const el = $(`vtag-${idx}`);
  if (!el) return null;
  const val = el.value.trim();
  const defaultTag = getVoiceTag(currentClips[idx].roleId);
  return (val && val !== defaultTag) ? val : null;
}

async function regenNow(idx) {
  const clip = currentClips[idx];
  const card = $(`clip-${idx}`);
  card.classList.add('regenerating');
  try {
    toast(`재생성 중: ${roleDisplayName(clip.roleId)}...`);
    const { blob, blobUrl } = await generateTts(clip.text, clip.speakerId, getTagOverride(idx));
    clip.regenBlobUrl = blobUrl;

    // Auto-convert to M4A and save
    const audioPath = getExpectedAudioPath(clip);
    if (projectDirHandle && audioPath) {
      try {
        toast(`M4A 변환 중: ${roleDisplayName(clip.roleId)}...`);
        await autoSaveClipAsM4a(clip, audioPath, blob);
        clip.audioUrl = audioPath;
        delete audioBlobCache['public' + audioPath];
        toast(`저장 완료: ${roleDisplayName(clip.roleId)}`, 'success');
      } catch (e) {
        toast(`M4A 변환/저장 실패: ${e.message}`, 'error');
        console.error('M4A save error:', e);
      }
    } else {
      toast(`재생성 완료: ${roleDisplayName(clip.roleId)}`, 'success');
    }

    card.classList.remove('regenerating');
    renderClipList();
    renderStats();
    stopAll(); _play(idx);
  } catch (e) {
    card.classList.remove('regenerating');
    toast(`재생성 실패: ${e.message}`, 'error');
    console.error(e);
  }
}

// ============================================================================
// WAV → M4A Conversion via local convert-server (node tools/convert-server.js)
// ============================================================================
let convertServerOk = false;

function getConvertBase() {
  const val = $('convertApiBase').value.trim().replace(/\/+$/, '');
  lsSet('convertBase', val);
  return val;
}

async function pingConvertServer() {
  const dot = $('convertStatus');
  const label = $('convertLabel');
  try {
    const resp = await fetch(getConvertBase() + '/health', { signal: AbortSignal.timeout(2000) });
    if (resp.ok) {
      const data = await resp.json();
      convertServerOk = data.ffmpeg !== false;
      dot.className = 'status-dot ok';
      dot.title = '변환 서버 연결됨';
      label.style.color = 'var(--green)';
      label.textContent = 'M4A 변환 OK';
    } else {
      convertServerOk = false;
      dot.className = 'status-dot err'; dot.title = '변환 서버 응답 오류';
      label.style.color = 'var(--red)'; label.textContent = 'M4A 오류';
    }
  } catch {
    convertServerOk = false;
    dot.className = 'status-dot err';
    dot.title = '변환 서버 없음 — node tools/convert-server.js 실행 필요';
    label.style.color = 'var(--red)';
    label.textContent = 'M4A 변환 서버 필요';
  }
}

async function convertWavToM4a(wavBlob) {
  if (!convertServerOk) {
    // Re-check once in case server started after page load
    await pingConvertServer();
  }
  if (!convertServerOk) {
    throw new Error('M4A 변환 서버가 실행되지 않았습니다. 터미널에서: node tools/convert-server.js');
  }

  const resp = await fetch(getConvertBase() + '/convert', {
    method: 'POST',
    headers: { 'Content-Type': 'audio/wav' },
    body: wavBlob,
  });

  if (!resp.ok) {
    const errText = await resp.text().catch(() => resp.statusText);
    throw new Error(`M4A 변환 실패 (${resp.status}): ${errText}`);
  }

  return await resp.blob();
}

function getExpectedAudioPath(clip) {
  if (clip.audioUrl) return clip.audioUrl;
  if (!scenarioData) return null;
  const sid = scenarioData.scenarioId;
  const eid = $('selEpisode').value;
  if (clip.type === 'opening') return `/assets/voices/${sid}/${eid}/pall/opening/001/voice.m4a`;
  if (clip.type === 'outro') return `/assets/voices/${sid}/${eid}/pall/outro/001/voice.m4a`;
  if (clip.type === 'role' && clip.roleId) return `/assets/voices/${sid}/${eid}/pall/role/${clip.roleId}/during/001/voice.m4a`;
  return null;
}

async function getOrCreateSubDir(dirHandle, pathParts) {
  let h = dirHandle;
  for (const part of pathParts) h = await h.getDirectoryHandle(part, { create: true });
  return h;
}

async function autoSaveClipAsM4a(clip, audioPath, wavBlob) {
  const m4aBlob = await convertWavToM4a(wavBlob);
  const relPath = ('public' + audioPath).replace(/\\/g, '/');
  const parts = relPath.split('/').filter(Boolean);
  const fileName = parts.pop();
  const dir = await getOrCreateSubDir(projectDirHandle, parts);
  const fileHandle = await dir.getFileHandle(fileName, { create: true });
  const writable = await fileHandle.createWritable();
  await writable.write(m4aBlob);
  await writable.close();
}

// ── Regenerate All Clips ──
let regenAllRunning = false;

async function regenAllClips() {
  if (!projectDirHandle) { toast('프로젝트 폴더가 연결되지 않았습니다', 'error'); return; }
  if (currentClips.length === 0 || regenAllRunning) return;

  if (!convertServerOk) {
    await pingConvertServer();
    if (!convertServerOk) { toast('M4A 변환 서버가 필요합니다. 터미널에서: node tools/convert-server.js', 'error'); return; }
  }

  regenAllRunning = true;
  $('btnRegenAll').disabled = true;
  $('btnRegenAll').textContent = '재생성 중...';

  const total = currentClips.length;
  let done = 0, failed = 0;

  // Show progress in queue panel
  $('queuePanel').classList.add('visible');
  const log = $('queueLog');
  log.textContent = `[${new Date().toLocaleTimeString()}] === 전체 재생성 시작 (${total}개) ===\n`;
  $('queueCount').textContent = total;
  $('queueDone').textContent = '0';
  $('queueProgressBar').style.width = '0%';

  for (let idx = 0; idx < currentClips.length; idx++) {
    const clip = currentClips[idx];
    const card = $(`clip-${idx}`);
    if (card) card.classList.add('regenerating');

    log.textContent += `[${new Date().toLocaleTimeString()}] #${idx + 1} ${roleDisplayName(clip.roleId)} 재생성 중...\n`;
    log.scrollTop = log.scrollHeight;

    try {
      const { blob, blobUrl } = await generateTts(clip.text, clip.speakerId, null);
      clip.regenBlobUrl = blobUrl;

      const audioPath = getExpectedAudioPath(clip);
      if (audioPath) {
        await autoSaveClipAsM4a(clip, audioPath, blob);
        clip.audioUrl = audioPath;
        delete audioBlobCache['public' + audioPath];
        log.textContent += `  → M4A 저장 완료\n`;
      }
      done++;
    } catch (e) {
      log.textContent += `  → 실패: ${e.message}\n`;
      failed++;
    }

    if (card) card.classList.remove('regenerating');
    $('queueDone').textContent = done + failed;
    $('queueProgressBar').style.width = `${((done + failed) / total) * 100}%`;
    $('queueCount').textContent = total - done - failed;
    log.scrollTop = log.scrollHeight;
  }

  log.textContent += `[${new Date().toLocaleTimeString()}] === 완료: 성공 ${done}, 실패 ${failed} ===\n`;
  toast(`전체 재생성 완료: 성공 ${done}개, 실패 ${failed}개`, done > 0 ? 'success' : 'error');

  regenAllRunning = false;
  $('btnRegenAll').disabled = false;
  $('btnRegenAll').innerHTML = '&#9889; 전체 재생성';
  renderClipList();
  renderStats();
}

function renderStats() {
  const total = currentClips.length;
  const withAudio = currentClips.filter(c => c.audioUrl).length;
  const missing = total - withAudio;
  const regenCount = currentClips.filter(c => c.regenBlobUrl).length;
  const modifiedCount = currentClips.filter(c => c.text !== c.originalText).length;
  $('statsBar').innerHTML = `
    <div class="stat-chip"><span class="num">${total}</span> 전체 클립</div>
    <div class="stat-chip" style="color:var(--green)"><span class="num">${withAudio}</span> 오디오 있음</div>
    ${missing > 0 ? `<div class="stat-chip" style="color:var(--red)"><span class="num">${missing}</span> 오디오 없음</div>` : ''}
    <div class="stat-chip"><span class="num">${regenQueue.length}</span> 재생성 큐</div>
    ${regenCount > 0 ? `<div class="stat-chip" style="color:var(--orange)"><span class="num">${regenCount}</span> 재생성됨 (자동저장)</div>` : ''}
    ${modifiedCount > 0 ? `<div class="stat-chip" style="color:var(--orange)"><span class="num">${modifiedCount}</span> 텍스트 수정됨</div>` : ''}
  `;
}

// ============================================================================
// Regen Queue
// ============================================================================
function addToQueue(idx) {
  const clip = currentClips[idx];
  if (regenQueue.some(q => q.clipIdx === idx)) { toast('이미 큐에 있습니다'); return; }
  regenQueue.push({ clipIdx: idx, text: clip.text, speakerId: clip.speakerId, roleId: clip.roleId, tagOverride: getTagOverride(idx) });
  renderStats(); updateQueuePanel();
  toast(`큐에 추가됨: #${idx + 1} ${roleDisplayName(clip.roleId)}`);
}

function clearRegenQueue() { regenQueue = []; regenRunning = false; updateQueuePanel(); renderStats(); }

function updateQueuePanel() {
  const panel = $('queuePanel');
  if (regenQueue.length > 0 || regenRunning) {
    panel.classList.add('visible');
    $('playbackBar').style.bottom = '60px';
  } else {
    panel.classList.remove('visible');
    $('playbackBar').style.bottom = '0';
  }
  $('queueCount').textContent = regenQueue.length;
  $('btnRunQueue').disabled = regenQueue.length === 0 || regenRunning;
}

$('btnRunQueue').addEventListener('click', runQueue);
$('btnClearQueue').addEventListener('click', () => {
  clearRegenQueue();
  $('queueLog').textContent = '';
  $('queueDone').textContent = '0';
  $('queueProgressBar').style.width = '0%';
});

async function runQueue() {
  if (regenQueue.length === 0 || regenRunning) return;
  regenRunning = true;
  $('btnRunQueue').disabled = true;
  const total = regenQueue.length;
  let done = 0;
  const log = $('queueLog');

  while (regenQueue.length > 0) {
    const item = regenQueue.shift();
    const idx = item.clipIdx;
    const card = $(`clip-${idx}`);
    log.textContent += `[${new Date().toLocaleTimeString()}] #${idx + 1} ${roleDisplayName(item.roleId)} 재생성 시작...\n`;
    log.scrollTop = log.scrollHeight;
    if (card) card.classList.add('regenerating');

    try {
      const { blob, blobUrl } = await generateTts(item.text, item.speakerId, item.tagOverride);
      currentClips[idx].regenBlobUrl = blobUrl;

      // Auto-convert and save
      const audioPath = getExpectedAudioPath(currentClips[idx]);
      if (projectDirHandle && audioPath) {
        try {
          await autoSaveClipAsM4a(currentClips[idx], audioPath, blob);
          currentClips[idx].audioUrl = audioPath;
          delete audioBlobCache['public' + audioPath];
          log.textContent += `  -> M4A 저장 완료\n`;
        } catch (e2) {
          log.textContent += `  -> TTS 완료, M4A 변환 실패: ${e2.message}\n`;
        }
      } else {
        log.textContent += `  -> 완료\n`;
      }
      done++;
    } catch (e) {
      log.textContent += `  -> 실패: ${e.message}\n`;
      done++;
    }

    if (card) card.classList.remove('regenerating');
    $('queueDone').textContent = done;
    $('queueProgressBar').style.width = `${(done / total) * 100}%`;
    $('queueCount').textContent = regenQueue.length;
    log.scrollTop = log.scrollHeight;
  }

  regenRunning = false;
  $('btnRunQueue').disabled = true;
  toast(`큐 처리 완료: ${done}/${total}`, 'success');
  renderStats();
}

async function pingServer() {
  const dot = $('serverStatus');
  try {
    const resp = await fetch(getApiBase() + '/v1/health', { method: 'GET' });
    if (resp.ok) {
      dot.className = 'status-dot ok'; dot.title = '연결됨 (Fish Speech)';
    } else {
      dot.className = 'status-dot err'; dot.title = `서버 응답: ${resp.status}`;
    }
  } catch {
    dot.className = 'status-dot err'; dot.title = '연결 실패';
  }
}

$('btnPing').addEventListener('click', async () => {
  $('serverStatus').className = 'status-dot';
  $('convertStatus').className = 'status-dot';
  await Promise.all([pingServer(), pingConvertServer()]);
  toast($('serverStatus').classList.contains('ok') ? 'TTS 서버 연결됨' : 'TTS 서버 연결 실패',
        $('serverStatus').classList.contains('ok') ? 'success' : 'error');
});

// ============================================================================
// Keyboard shortcuts
// ============================================================================
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === ' ') { e.preventDefault(); audioPlayer.paused ? audioPlayer.play() : audioPlayer.pause(); }
  if (e.key === 'Escape') {
    if ($('vbRolePicker').style.display !== 'none') { hideRolePicker(); return; }
    const confirmEl = document.querySelector('.confirm-overlay');
    if (confirmEl) { confirmEl.remove(); return; }
    closeVoiceMapPanel(false); stopAll();
  }
  if (e.key === 'ArrowRight' && playingIdx >= 0) _play(playingIdx + 1);
  if (e.key === 'ArrowLeft' && playingIdx > 0) _play(playingIdx - 1);
});

// ============================================================================
// Voice Map Panel
// ============================================================================
let serverVoices = [];      // reference IDs from Fish Speech server
const voicePreviewCache = {}; // refId → blobUrl

function openVoiceMapPanel() {
  $('vmOverlay').classList.add('open');
  $('vmPanel').classList.add('open');
  renderVoiceMapList();
  renderVoiceBrowser();
  if (serverVoices.length === 0 && !voiceLibDirHandle) fetchServerVoices();
}

function closeVoiceMapPanel(force) {
  if (!force && voiceMapDirty) {
    showConfirm(
      'Voice Map 변경사항',
      '저장하지 않은 변경사항이 있습니다. 저장하시겠습니까?',
      [
        { label: '저장 후 닫기', cls: 'primary', action: async () => { await saveVoiceMap(); doCloseVmPanel(); } },
        { label: '저장 안 함', cls: 'danger', action: () => { revertVoiceMap(); doCloseVmPanel(); } },
        { label: '취소', cls: '', action: () => {} },
      ]
    );
    return;
  }
  doCloseVmPanel();
}

function doCloseVmPanel() {
  $('vmOverlay').classList.remove('open');
  $('vmPanel').classList.remove('open');
  hideRolePicker();
}

function revertVoiceMap() {
  if (voiceMapOriginal) {
    try { voiceMap = JSON.parse(voiceMapOriginal); } catch {}
  }
  voiceMapDirty = false;
  updateVmSaveBtn();
  if (currentClips.length > 0) renderClipList();
}

function showConfirm(title, message, buttons) {
  const existing = document.querySelector('.confirm-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = `
    <div class="confirm-box">
      <h3>${escapeHtml(title)}</h3>
      <p>${escapeHtml(message)}</p>
      <div class="actions" id="confirmActions"></div>
    </div>
  `;
  document.body.appendChild(overlay);

  const actionsEl = overlay.querySelector('#confirmActions');
  for (const b of buttons) {
    const btn = document.createElement('button');
    btn.className = `btn ${b.cls}`;
    btn.textContent = b.label;
    btn.addEventListener('click', () => { overlay.remove(); b.action(); });
    actionsEl.appendChild(btn);
  }
}

async function fetchServerVoices() {
  // Load from local voice library directory (voices.json)
  if (!voiceLibDirHandle) {
    try {
      voiceLibDirHandle = await window.showDirectoryPicker({ mode: 'read' });
    } catch (e) {
      if (e.name !== 'AbortError') toast(`폴더 선택 실패: ${e.message}`, 'error');
      return;
    }
  }

  try {
    const fileHandle = await voiceLibDirHandle.getFileHandle('voices.json');
    const file = await fileHandle.getFile();
    const data = JSON.parse(await file.text());
    voicesJsonData = data.voices || [];
    serverVoices = voicesJsonData.map(v => v.tag).sort();
    lsSetJson('serverVoices', serverVoices);
    lsSet('voiceLibName', voiceLibDirHandle.name);
    idbSave('voiceLibDir', voiceLibDirHandle);
    $('vmVoiceCount').textContent = `${serverVoices.length}개 음성`;
    renderVoiceMapList();
    toast(`음성 라이브러리 ${serverVoices.length}개 로드됨 (${voiceLibDirHandle.name})`, 'success');
  } catch (e) {
    toast(`voices.json 로드 실패: ${e.message}. data/voices/ref 폴더를 선택하세요.`, 'error');
    voiceLibDirHandle = null;
  }
}

function getRoleEntries() {
  if (!voiceMap) return [];
  const skip = new Set(['_comment','_voicesSource','_note','_roles']);
  return Object.entries(voiceMap).filter(([k]) => !skip.has(k) && !k.startsWith('_'));
}

function renderVoiceMapList() {
  const container = $('vmRoleList');
  const entries = getRoleEntries();
  if (entries.length === 0) {
    container.innerHTML = '<div class="loading">voice_map.json을 먼저 로드하세요</div>';
    return;
  }

  const filter = ($('vmSearch').value || '').toLowerCase();

  let html = '';
  for (const [roleId, currentVoice] of entries) {
    const displayName = roleDisplayName(roleId);
    if (filter && !displayName.toLowerCase().includes(filter) && !roleId.toLowerCase().includes(filter) && !currentVoice.toLowerCase().includes(filter)) continue;

    let options;
    if (serverVoices.length > 0) {
      options = serverVoices.map(v => {
        const sel = v === currentVoice ? 'selected' : '';
        return `<option value="${escapeHtml(v)}" ${sel}>${escapeHtml(v)}</option>`;
      }).join('');
      // Ensure current voice is in the list even if not found in library
      if (currentVoice && !serverVoices.includes(currentVoice)) {
        options = `<option value="${escapeHtml(currentVoice)}" selected>${escapeHtml(currentVoice)} (unknown)</option>` + options;
      }
    } else {
      options = `<option value="${escapeHtml(currentVoice)}" selected>${escapeHtml(currentVoice)}</option>`;
    }

    html += `
      <div class="vm-role-row">
        <div>
          <div class="vm-role-name">${displayName}</div>
          <div class="vm-role-id">${roleId}</div>
        </div>
        <select class="vm-voice-select" data-role="${roleId}" onchange="onVoiceMapChange(this)">
          ${options}
        </select>
        <button class="vm-preview-btn" data-role="${roleId}" onclick="previewVoice(this)">
          &#9654; 미리듣기
        </button>
      </div>`;
  }
  container.innerHTML = html || '<div style="color:var(--text-dim);padding:20px;text-align:center">검색 결과 없음</div>';
}

$('vmSearch').addEventListener('input', renderVoiceMapList);

function onVoiceMapChange(selectEl) {
  const roleId = selectEl.dataset.role;
  const newVoice = selectEl.value;
  if (voiceMap) voiceMap[roleId] = newVoice;
  voiceMapDirty = true;
  updateVmSaveBtn();
  if (currentClips.length > 0) renderClipList();
}

function updateVmSaveBtn() {
  const btn = $('btnVmSave');
  if (voiceMapDirty) {
    btn.innerHTML = '&#128190; voice_map.json 저장 <span style="color:var(--orange);font-size:10px">(변경됨)</span>';
    btn.classList.add('primary');
  } else {
    btn.innerHTML = 'voice_map.json 저장';
    btn.classList.remove('primary');
  }
}

async function previewVoice(btn) {
  const selectEl = btn.parentElement.querySelector('.vm-voice-select');
  const tag = selectEl.value;
  if (!tag) return;

  // Check cache
  if (voicePreviewCache[tag]) {
    audioPlayer.src = voicePreviewCache[tag];
    audioPlayer.play().catch(() => {});
    $('playbackBar').classList.add('visible');
    $('pbNowPlaying').innerHTML = `<span class="role">미리듣기</span> &mdash; ${escapeHtml(tag)}`;
    return;
  }

  if (!voiceLibDirHandle) {
    toast('음성 라이브러리 폴더를 먼저 선택하세요 (새로고침 버튼)', 'error');
    return;
  }

  const entry = findVoiceEntry(tag);
  if (!entry) { toast(`"${tag}" 음성 정보를 찾을 수 없습니다`, 'error'); return; }

  btn.disabled = true;
  btn.textContent = '로딩...';

  try {
    const fileHandle = await voiceLibDirHandle.getFileHandle(entry.audio_filename);
    const file = await fileHandle.getFile();
    const blobUrl = URL.createObjectURL(file);
    voicePreviewCache[tag] = blobUrl;

    audioPlayer.src = blobUrl;
    audioPlayer.play().catch(() => {});
    $('playbackBar').classList.add('visible');
    const promptPreview = (entry.prompt_text || '').substring(0, 50);
    $('pbNowPlaying').innerHTML = `<span class="role">${escapeHtml(tag)}</span> &mdash; ${escapeHtml(promptPreview)}...`;
  } catch (e) {
    toast(`미리듣기 실패: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '&#9654; 미리듣기';
  }
}

// ============================================================================
// Voice Browser (hover-to-play)
// ============================================================================
let vbHoverTimer = null;
let vbPlayingTag = null;

function chipGradient(str) {
  let h1 = 0, h2 = 0;
  for (let i = 0; i < str.length; i++) {
    h1 = (h1 * 31 + str.charCodeAt(i)) & 0xFFFFFF;
    h2 = (h2 * 37 + str.charCodeAt(str.length - 1 - i)) & 0xFFFFFF;
  }
  const hue1 = h1 % 360, hue2 = (h2 % 360);
  return `linear-gradient(135deg, hsl(${hue1},55%,38%), hsl(${hue2},55%,32%))`;
}

function renderVoiceBrowser() {
  const grid = $('vbGrid');
  if (serverVoices.length === 0) {
    grid.innerHTML = '<span style="color:var(--text-dim);font-size:12px;padding:8px">음성 라이브러리를 먼저 로드하세요</span>';
    $('vbCount').textContent = '0';
    return;
  }

  const filter = ($('vbSearch').value || '').toLowerCase();
  const filtered = filter ? serverVoices.filter(v => v.toLowerCase().includes(filter)) : serverVoices;
  $('vbCount').textContent = `${filtered.length}/${serverVoices.length}`;

  grid.innerHTML = filtered.map(tag =>
    `<span class="vb-chip ${tag === vbPlayingTag ? 'playing' : ''}" data-tag="${escapeHtml(tag)}" style="background:${chipGradient(tag)}">${escapeHtml(tag)}</span>`
  ).join('');

  // Attach hover + click events
  grid.querySelectorAll('.vb-chip').forEach(chip => {
    chip.addEventListener('mouseenter', onVbChipEnter);
    chip.addEventListener('mouseleave', onVbChipLeave);
    chip.addEventListener('click', onVbChipClick);
  });
}

async function onVbChipEnter(e) {
  const tag = e.target.dataset.tag;
  clearTimeout(vbHoverTimer);
  // 200ms debounce to avoid rapid fire while scrolling
  vbHoverTimer = setTimeout(() => playVoicePreview(tag), 200);
}

function onVbChipLeave() {
  clearTimeout(vbHoverTimer);
}

function onVbChipClick(e) {
  const tag = e.target.dataset.tag;
  if (!tag || !voiceMap) return;

  // Position the picker near the chip
  const rect = e.target.getBoundingClientRect();
  showRolePicker(tag, rect.right + 8, rect.top);
}

function showRolePicker(tag, x, y) {
  const picker = $('vbRolePicker');
  const entries = getRoleEntries();
  if (entries.length === 0) return;

  // Clamp position to viewport
  const vw = window.innerWidth, vh = window.innerHeight;
  if (x + 260 > vw) x = vw - 270;
  if (y + 360 > vh) y = Math.max(10, vh - 370);

  picker.style.left = x + 'px';
  picker.style.top = y + 'px';
  picker.style.display = 'flex';

  picker.innerHTML = `
    <div class="vb-role-picker-header">
      <span>${escapeHtml(tag)}</span>
      <button class="close-btn" onclick="hideRolePicker()">&#10005;</button>
    </div>
    <div class="vb-role-picker-list">
      ${entries.map(([rid, curVoice]) => {
        const isSame = curVoice === tag;
        return `<div class="vb-role-picker-item ${isSame ? 'same-voice' : ''}"
                     data-role="${rid}" data-tag="${escapeHtml(tag)}">
          <span class="role-label">${roleDisplayName(rid)}</span>
          <span class="cur-voice" title="${escapeHtml(curVoice)}">${isSame ? '&#10003; 현재' : escapeHtml(curVoice)}</span>
        </div>`;
      }).join('')}
    </div>
  `;

  // Add backdrop to close on outside click
  let backdrop = document.querySelector('.vb-role-picker-backdrop');
  if (!backdrop) {
    backdrop = document.createElement('div');
    backdrop.className = 'vb-role-picker-backdrop';
    backdrop.addEventListener('click', hideRolePicker);
    document.body.appendChild(backdrop);
  }
  backdrop.style.display = 'block';

  // Click handler for role items
  picker.querySelectorAll('.vb-role-picker-item').forEach(item => {
    item.addEventListener('click', () => {
      const roleId = item.dataset.role;
      const voiceTag = item.dataset.tag;
      voiceMap[roleId] = voiceTag;
      voiceMapDirty = true;
      updateVmSaveBtn();
      toast(`${roleDisplayName(roleId)} → ${voiceTag}`, 'success');
      hideRolePicker();
      renderVoiceMapList();
      if (currentClips.length > 0) renderClipList();
    });
  });
}

function hideRolePicker() {
  $('vbRolePicker').style.display = 'none';
  const backdrop = document.querySelector('.vb-role-picker-backdrop');
  if (backdrop) backdrop.style.display = 'none';
}

async function playVoicePreview(tag) {
  if (!voiceLibDirHandle) return;

  // Mark playing chip
  document.querySelectorAll('.vb-chip.playing').forEach(c => c.classList.remove('playing'));
  const chip = document.querySelector(`.vb-chip[data-tag="${CSS.escape(tag)}"]`);
  if (chip) chip.classList.add('playing');
  vbPlayingTag = tag;
  $('vbNowPlaying').textContent = tag;

  // Use cache if available
  if (voicePreviewCache[tag]) {
    audioPlayer.src = voicePreviewCache[tag];
    audioPlayer.play().catch(() => {});
    return;
  }

  const entry = findVoiceEntry(tag);
  if (!entry) return;

  try {
    const fileHandle = await voiceLibDirHandle.getFileHandle(entry.audio_filename);
    const file = await fileHandle.getFile();
    const blobUrl = URL.createObjectURL(file);
    voicePreviewCache[tag] = blobUrl;
    audioPlayer.src = blobUrl;
    audioPlayer.play().catch(() => {});
  } catch {}
}

async function saveVoiceMap() {
  if (!voiceMap) { toast('voice_map 데이터 없음', 'error'); return; }

  if (projectDirHandle) {
    // Local mode: write via FileSystem Access API
    try {
      const parts = 'characters/voice_map.json'.split('/');
      const fileName = parts.pop();
      const dir = await getSubDir(projectDirHandle, parts);
      const fileHandle = await dir.getFileHandle(fileName, { create: false });
      const writable = await fileHandle.createWritable();
      await writable.write(JSON.stringify(voiceMap, null, 2) + '\n');
      await writable.close();
      voiceMapDirty = false;
      voiceMapOriginal = JSON.stringify(voiceMap);
      updateVmSaveBtn();
      toast('voice_map.json 저장 완료', 'success');
    } catch (e) {
      toast(`저장 실패: ${e.message}`, 'error');
    }
  } else {
    // HTTP mode: can't write to server, download as file
    const blob = new Blob([JSON.stringify(voiceMap, null, 2) + '\n'], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'voice_map.json';
    a.click(); URL.revokeObjectURL(url);
    voiceMapDirty = false;
    voiceMapOriginal = JSON.stringify(voiceMap);
    updateVmSaveBtn();
    toast('voice_map.json 다운로드됨 (수동으로 교체하세요)', 'success');
  }
}

  $('clipContainer').innerHTML = `
    <div class="folder-banner">
      <h2>프로젝트 폴더 선택</h2>
      <p>
        file:// 프로토콜에서는 보안 제한으로 직접 파일을 읽을 수 없습니다.<br>
        아래 버튼을 클릭해서 프로젝트 루트 폴더를 선택해주세요.<br>
        <small style="color:var(--text-dim)">
          (One-Night-Ultimate-Werewolf-LLM-Edition 폴더)
        </small>
        ${hint}
      </p>
      <button class="btn primary" onclick="pickProjectFolder()">폴더 선택</button>
    </div>
  `;
}

async function pickProjectFolder() {
  try {
    projectDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });

    // Verify it's the right folder by checking a known file
    try {
      await readJsonFromDir(projectDirHandle, 'characters/voice_map.json');
    } catch {
      toast('올바른 프로젝트 폴더가 아닙니다. One-Night-Ultimate-Werewolf-LLM-Edition 폴더를 선택해주세요.', 'error');
      projectDirHandle = null;
      return;
    }

    lsSet('folderName', projectDirHandle.name);
    idbSave('projectDir', projectDirHandle);
    $('modeBadge').textContent = 'LOCAL';
    $('modeBadge').className = 'mode-badge local';
    toast('프로젝트 폴더 연결됨', 'success');

    await loadVoiceMap();
    initSelectors();
    $('clipContainer').innerHTML = '<div class="loading">시나리오를 선택하세요</div>';
    restoreSelection();
  } catch (e) {
    if (e.name !== 'AbortError') {
      toast(`폴더 선택 실패: ${e.message}`, 'error');
    }
  }
}

// ============================================================================
// Init
// ============================================================================
function restoreFromCache() {
  // Restore API base URL
  const savedApi = lsGet('apiBase', '');
  if (savedApi) $('ttsApiBase').value = savedApi;

  // Restore convert server URL
  const savedConvert = lsGet('convertBase', '');
  if (savedConvert) $('convertApiBase').value = savedConvert;

  // Restore server voices cache
  const cachedVoices = lsGetJson('serverVoices', []);
  if (cachedVoices.length > 0) serverVoices = cachedVoices;
}

function restoreSelection() {
  // Restore last scenario & episode
  const savedScenario = lsGet('scenario', '');
  const savedEpisode = lsGet('episode', '');
  if (savedScenario && $('selScenario').querySelector(`option[value="${savedScenario}"]`)) {
    $('selScenario').value = savedScenario;
    onScenarioChange().then(() => {
      if (savedEpisode && $('selEpisode').querySelector(`option[value="${savedEpisode}"]`)) {
        $('selEpisode').value = savedEpisode;
        renderEpisode(savedEpisode);
      }
    });
  }
}

async function tryRestoreHandles() {
  // Try restoring project dir handle from IndexedDB
  const savedProjectHandle = await idbLoad('projectDir');
  if (savedProjectHandle) {
    $('clipContainer').innerHTML = '<div class="loading"><div class="spinner"></div>이전 폴더 권한 확인 중...</div>';
    const granted = await reRequestPermission(savedProjectHandle, 'readwrite');
    if (granted) {
      // Verify it's still valid
      try {
        await readJsonFromDir(savedProjectHandle, 'characters/voice_map.json');
        projectDirHandle = savedProjectHandle;
        $('modeBadge').textContent = 'LOCAL';
        $('modeBadge').className = 'mode-badge local';
        await loadVoiceMap();
        initSelectors();
        $('clipContainer').innerHTML = '<div class="loading">시나리오를 선택하세요</div>';
        restoreSelection();
        toast('프로젝트 폴더 자동 연결됨', 'success');
      } catch {
        // Handle invalid, show picker
        showFolderPicker(lsGet('folderName', ''));
      }
    } else {
      showFolderPicker(lsGet('folderName', ''));
    }
  } else {
    showFolderPicker(lsGet('folderName', ''));
  }

  // Try restoring voice lib handle
  const savedVoiceLibHandle = await idbLoad('voiceLibDir');
  if (savedVoiceLibHandle) {
    const granted = await reRequestPermission(savedVoiceLibHandle, 'read');
    if (granted) {
      try {
        const fh = await savedVoiceLibHandle.getFileHandle('voices.json');
        const file = await fh.getFile();
        const data = JSON.parse(await file.text());
        voiceLibDirHandle = savedVoiceLibHandle;
        voicesJsonData = data.voices || [];
        serverVoices = voicesJsonData.map(v => v.tag).sort();
        lsSetJson('serverVoices', serverVoices);
      } catch {
        voiceLibDirHandle = null;
      }
    }
  }
}

(async function init() {
  restoreFromCache();

  if (isFileProtocol) {
    $('modeBadge').textContent = 'FILE://';
    $('modeBadge').className = 'mode-badge';

    if (window.showDirectoryPicker) {
      await tryRestoreHandles();
    } else {
      $('clipContainer').innerHTML = `
        <div class="folder-banner">
          <h2>브라우저 지원 필요</h2>
          <p>
            file:// 모드에서는 File System Access API가 필요합니다.<br>
            <strong>Chrome</strong> 또는 <strong>Edge</strong> 브라우저를 사용해주세요.<br>
            또는 HTTP 서버로 실행하세요:
            <code style="background:var(--bg);padding:4px 8px;border-radius:4px;display:block;margin-top:8px">
              python -m http.server 8899
            </code>
          </p>
        </div>
      `;
    }
    pingServer();
    pingConvertServer();
  } else {
    $('modeBadge').textContent = 'HTTP';
    $('modeBadge').className = 'mode-badge http';
    await loadVoiceMap();
    initSelectors();
    $('clipContainer').innerHTML = '<div class="loading">시나리오를 선택하세요</div>';
    restoreSelection();
    pingServer();
    pingConvertServer();
  }
})();
</script>
</body>
</html>
