<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTS Voice Reviewer</title>
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a24;
    --surface2: #22222e;
    --border: #2e2e3e;
    --text: #e0e0e8;
    --text-dim: #888898;
    --accent: #7c6aef;
    --accent-hover: #9584ff;
    --green: #4ade80;
    --red: #f87171;
    --orange: #fb923c;
    --blue: #60a5fa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 18px; font-weight: 600; white-space: nowrap; }
  .selector-group { display: flex; align-items: center; gap: 8px; }
  .selector-group label { font-size: 13px; color: var(--text-dim); white-space: nowrap; }
  select {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; font-size: 14px; cursor: pointer; outline: none;
  }
  select:hover { border-color: var(--accent); }

  .server-config {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
  }
  .server-config input {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-size: 13px; width: 340px; outline: none;
  }
  .server-config input:focus { border-color: var(--accent); }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--text-dim); flex-shrink: 0;
  }
  .status-dot.ok { background: var(--green); }
  .status-dot.err { background: var(--red); }

  /* ── Folder picker banner ── */
  .folder-banner {
    background: var(--surface2);
    border: 2px dashed var(--accent);
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    margin: 60px auto;
    max-width: 600px;
  }
  .folder-banner h2 { font-size: 20px; margin-bottom: 12px; }
  .folder-banner p { font-size: 14px; color: var(--text-dim); margin-bottom: 20px; line-height: 1.6; }
  .folder-banner .btn { font-size: 16px; padding: 12px 28px; }
  .mode-badge {
    font-size: 11px; padding: 2px 8px; border-radius: 4px;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
  }
  .mode-badge.local { border-color: var(--green); color: var(--green); }
  .mode-badge.http { border-color: var(--blue); color: var(--blue); }

  /* ── Main (split layout) ── */
  .app-body { display: flex; height: calc(100vh - 60px); overflow: hidden; }
  .app-body main { flex: 1; min-width: 0; overflow-y: auto; padding: 24px; }
  .app-body .lm-sidebar {
    width: 420px; flex-shrink: 0;
    display: flex; flex-direction: column;
    background: var(--bg); border-left: 1px solid var(--border);
    transition: width 0.25s, opacity 0.25s;
    overflow: hidden;
  }
  .app-body .lm-sidebar.collapsed { width: 0; opacity: 0; pointer-events: none; }

  .stats-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 16px; font-size: 13px;
    display: flex; align-items: center; gap: 6px;
  }
  .stat-chip .num { font-weight: 700; font-size: 16px; }

  .clip-section-header {
    background: var(--accent); color: #fff;
    padding: 8px 16px; font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    border-radius: 6px 6px 0 0; margin-top: 16px;
  }
  .clip-section-header:first-child { margin-top: 0; }

  .clip-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; padding: 14px 16px;
    display: grid; grid-template-columns: 36px 130px 1fr auto;
    gap: 12px; align-items: start; transition: background 0.15s;
  }
  .clip-card:hover { background: var(--surface2); }
  .clip-card { cursor: pointer; user-select: none; }
  .clip-card.playing { border-left: 3px solid var(--accent); }
  .clip-card.modified { border-left: 3px solid var(--orange); }
  .clip-card.regenerating { border-left: 3px solid var(--blue); opacity: 0.7; }
  .clip-card.selected { background: rgba(124,106,239,0.12); border-color: var(--accent); }
  .clip-card.selected .clip-index { color: var(--accent); font-weight: 700; }

  .clip-index { font-size: 12px; color: var(--text-dim); text-align: center; padding-top: 2px; }
  .clip-speaker { display: flex; flex-direction: column; gap: 2px; }
  .clip-speaker .role-name { font-size: 14px; font-weight: 600; color: var(--accent); }
  .clip-speaker .voice-tag { font-size: 11px; color: var(--text-dim); }
  .voice-tag-input {
    background: var(--bg); color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 2px 6px; font-size: 11px; width: 120px; outline: none;
  }
  .voice-tag-input:focus { border-color: var(--accent); color: var(--text); }

  .clip-body { display: flex; flex-direction: column; gap: 8px; }
  .clip-text { font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
  .clip-text-edit {
    display: none; width: 100%; min-height: 80px;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--accent); border-radius: 6px;
    padding: 10px; font-size: 14px; line-height: 1.6;
    font-family: inherit; resize: vertical; outline: none;
  }
  .clip-actions {
    display: flex; flex-direction: column; gap: 6px;
    align-items: flex-end; min-width: 120px;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px; border: 1px solid var(--border);
    border-radius: 6px; background: var(--surface2);
    color: var(--text); font-size: 12px; cursor: pointer;
    white-space: nowrap; transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent-hover); }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: var(--red); color: #fff; }
  .btn-sm { padding: 4px 8px; font-size: 11px; }

  .queue-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; gap: 16px;
    z-index: 100; transform: translateY(100%); transition: transform 0.3s;
  }
  .queue-panel.visible { transform: translateY(0); }
  .queue-panel .queue-info { font-size: 13px; flex: 1; }
  .queue-panel .queue-info strong { color: var(--accent); }
  .queue-progress { width: 200px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .queue-progress-bar { height: 100%; background: var(--accent); border-radius: 3px; width: 0%; transition: width 0.3s; }
  .queue-log { max-height: 60px; overflow-y: auto; font-size: 11px; color: var(--text-dim); flex: 1; font-family: 'Consolas', monospace; }

  .playback-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 2px solid var(--accent);
    padding: 10px 24px; display: flex; align-items: center; gap: 12px;
    z-index: 99; transform: translateY(100%); transition: transform 0.3s;
  }
  .playback-bar.visible { transform: translateY(0); }
  .playback-bar .now-playing { font-size: 13px; flex-shrink: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .playback-bar .now-playing .role { color: var(--accent); font-weight: 600; }
  .playback-bar audio { flex: 1; min-width: 200px; max-width: 480px; height: 36px; }

  .toast-container { position: fixed; top: 80px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 16px; font-size: 13px;
    animation: toastIn 0.3s, toastOut 0.3s 2.7s; max-width: 400px;
  }
  .toast.error { border-color: var(--red); color: var(--red); }
  .toast.success { border-color: var(--green); color: var(--green); }
  @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } }
  @keyframes toastOut { to { opacity: 0; transform: translateX(20px); } }

  .loading { text-align: center; padding: 60px; color: var(--text-dim); font-size: 14px; }
  .spinner {
    width: 24px; height: 24px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.6s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Voice Map Panel ── */
  .vmpanel-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 300; display: none;
  }
  .vmpanel-overlay.open { display: block; }
  .vmpanel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(640px, 90vw); background: var(--bg);
    border-left: 1px solid var(--border);
    z-index: 301; display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform 0.3s;
  }
  .vmpanel.open { transform: translateX(0); }
  .vmpanel-header {
    padding: 16px 20px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .vmpanel-header h2 { font-size: 16px; flex: 1; }
  .vmpanel-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .vmpanel-footer {
    padding: 12px 20px; background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
  }

  .vm-search {
    width: 100%; background: var(--surface); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 12px; font-size: 13px; outline: none; margin-bottom: 12px;
  }
  .vm-search:focus { border-color: var(--accent); }

  .vm-role-row {
    display: grid; grid-template-columns: 130px 1fr auto;
    gap: 10px; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--border);
  }
  .vm-role-name { font-size: 13px; font-weight: 600; }
  .vm-role-id { font-size: 10px; color: var(--text-dim); }
  .vm-voice-select {
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 8px; font-size: 13px; outline: none; width: 100%;
  }
  .vm-voice-select:focus { border-color: var(--accent); }
  .vm-preview-btn {
    padding: 4px 10px; font-size: 11px; cursor: pointer;
    background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    white-space: nowrap;
  }
  .vm-preview-btn:hover { border-color: var(--accent); color: var(--accent); }
  .vm-preview-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .vm-preview-btn.loading { color: var(--blue); border-color: var(--blue); }

  .vm-section-title {
    font-size: 12px; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.5px; padding: 12px 0 6px; border-bottom: 2px solid var(--accent);
    margin-top: 8px;
  }
  .vm-voice-count { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }

  /* ── Voice Browser (hover-to-play grid) ── */
  .vb-container {
    border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 16px; overflow: hidden;
  }
  .vb-header {
    background: var(--surface); padding: 8px 12px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border); cursor: pointer;
  }
  .vb-header:hover { background: var(--surface2); }
  .vb-header h3 { font-size: 13px; flex: 1; }
  .vb-search {
    width: 100%; background: var(--surface2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 6px 10px; font-size: 12px; outline: none;
    margin: 8px 12px; width: calc(100% - 24px);
  }
  .vb-search:focus { border-color: var(--accent); }
  .vb-grid {
    display: flex; flex-wrap: wrap; gap: 4px;
    padding: 8px 12px; max-height: 240px; overflow-y: auto;
  }
  .vb-chip {
    padding: 4px 10px; font-size: 11px;
    color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 14px;
    cursor: pointer; transition: all 0.12s; white-space: nowrap;
  }
  .vb-chip:hover {
    border-color: #fff; transform: scale(1.08);
    filter: brightness(1.25);
  }
  .vb-chip.playing {
    border-color: #fff; transform: scale(1.08);
    box-shadow: 0 0 8px rgba(124,106,239,0.6);
    filter: brightness(1.3);
  }
  .vb-assign-bar {
    background: var(--surface); padding: 6px 12px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-dim);
  }
  .vb-assign-bar select {
    font-size: 12px; padding: 3px 6px;
  }

  /* ── Batch Panel ── */
  .batch-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 300; display: none;
  }
  .batch-overlay.open { display: block; }
  .batch-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(720px, 92vw); background: var(--bg);
    border-left: 1px solid var(--border);
    z-index: 301; display: flex; flex-direction: column;
    transform: translateX(100%); transition: transform 0.3s;
  }
  .batch-panel.open { transform: translateX(0); }
  .batch-panel-header {
    padding: 16px 20px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .batch-panel-header h2 { font-size: 16px; flex: 1; }
  .batch-panel-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .batch-panel-footer {
    padding: 12px 20px; background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center;
  }
  .batch-panel-footer .spacer { flex: 1; }

  .batch-scenario-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .batch-scenario-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; font-size: 13px; cursor: pointer; transition: border-color 0.15s;
  }
  .batch-scenario-item:hover { border-color: var(--accent); }
  .batch-scenario-item input[type=checkbox] { accent-color: var(--accent); }
  .batch-scenario-item .name { font-weight: 600; flex: 1; }
  .batch-scenario-item .meta { font-size: 11px; color: var(--text-dim); }

  .batch-options { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .batch-options label { font-size: 12px; display: flex; align-items: center; gap: 5px; cursor: pointer; }
  .batch-options input[type=checkbox] { accent-color: var(--accent); }

  .batch-log-area {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px; font-family: 'Consolas', monospace; font-size: 11px;
    color: var(--text-dim); max-height: 300px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-all;
  }
  .batch-progress-bar {
    height: 8px; background: var(--border); border-radius: 4px;
    overflow: hidden; margin-bottom: 12px;
  }
  .batch-progress-bar .fill {
    height: 100%; background: var(--accent); border-radius: 4px;
    width: 0%; transition: width 0.3s;
  }
  .batch-stats { display: flex; gap: 12px; margin-bottom: 12px; font-size: 12px; }
  .batch-stats span { padding: 4px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; }

  /* ── Voice Chip → Role Picker Popup ── */
  .vb-role-picker {
    position: fixed; z-index: 350;
    background: var(--bg); border: 2px solid var(--accent);
    border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    width: 260px; max-height: 360px;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .vb-role-picker-header {
    padding: 10px 14px; background: var(--accent); color: #fff;
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: space-between;
  }
  .vb-role-picker-header .close-btn {
    background: none; border: none; color: #fff; font-size: 16px; cursor: pointer; padding: 0 4px;
  }
  .vb-role-picker-list { overflow-y: auto; flex: 1; }
  .vb-role-picker-item {
    padding: 8px 14px; font-size: 13px; cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border); transition: background 0.1s;
  }
  .vb-role-picker-item:hover { background: var(--surface2); }
  .vb-role-picker-item .role-label { font-weight: 600; }
  .vb-role-picker-item .cur-voice {
    font-size: 10px; color: var(--text-dim); max-width: 100px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .vb-role-picker-item.same-voice .cur-voice { color: var(--green); }
  .vb-role-picker-backdrop {
    position: fixed; inset: 0; z-index: 349; background: transparent;
  }

  /* ── Confirm Dialog ── */
  .confirm-overlay {
    position: fixed; inset: 0; z-index: 400;
    background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
  }
  .confirm-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; min-width: 320px; max-width: 420px;
  }
  .confirm-box h3 { font-size: 15px; margin-bottom: 10px; }
  .confirm-box p { font-size: 13px; color: var(--text-dim); margin-bottom: 18px; line-height: 1.5; }
  .confirm-box .actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* ── LM Studio Chat Panel (inline sidebar) ── */
  .lm-panel {
    display: flex; flex-direction: column;
    height: 100%; width: 100%;
  }
  .lm-panel-header {
    padding: 8px 12px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .lm-panel-header h2 { font-size: 14px; flex: 1; }

  .lm-config {
    padding: 8px 12px; background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
  }
  .lm-config-row { display: flex; align-items: center; gap: 8px; }
  .lm-config-row label { font-size: 12px; color: var(--text-dim); min-width: 50px; }
  .lm-config-row input {
    flex: 1; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-size: 13px; outline: none;
  }
  .lm-config-row input:focus { border-color: var(--accent); }
  .lm-config-row select {
    flex: 1; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font-size: 13px; outline: none;
  }

  .lm-skill-info {
    padding: 6px 12px; background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 11px; color: var(--text-dim);
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .lm-skill-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 4px;
    background: var(--accent); color: #fff; font-weight: 600;
  }

  .lm-messages {
    flex: 1; overflow-y: auto; padding: 12px 16px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .lm-msg {
    max-width: 90%; padding: 10px 14px;
    border-radius: 12px; font-size: 13px; line-height: 1.6;
    word-break: break-word; white-space: pre-wrap;
  }
  .lm-msg.user {
    align-self: flex-end; background: var(--accent); color: #fff;
    border-bottom-right-radius: 4px;
  }
  .lm-msg.assistant {
    align-self: flex-start; background: var(--surface);
    border: 1px solid var(--border); border-bottom-left-radius: 4px;
  }
  .lm-msg.system-msg {
    align-self: center; background: transparent;
    color: var(--text-dim); font-size: 11px; text-align: center;
    padding: 4px 8px;
  }
  .lm-msg .lm-edits {
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border);
  }
  .lm-edit-item {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; margin-top: 6px;
    font-size: 12px;
  }
  .lm-edit-item .clip-label { color: var(--accent); font-weight: 600; margin-bottom: 4px; }
  .lm-edit-item .edit-text { color: var(--text); white-space: pre-wrap; }
  .lm-edit-item .lm-apply-btn {
    margin-top: 6px; padding: 3px 10px; font-size: 11px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 4px; cursor: pointer;
  }
  .lm-edit-item .lm-apply-btn:hover { background: var(--accent-hover); }
  .lm-edit-item .lm-apply-btn.applied { background: var(--green); cursor: default; }

  .lm-input-area {
    padding: 8px 12px; background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
  }
  .lm-input-area textarea {
    flex: 1; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px; font-size: 13px; font-family: inherit;
    resize: none; outline: none; min-height: 40px; max-height: 120px;
    line-height: 1.5;
  }
  .lm-input-area textarea:focus { border-color: var(--accent); }
  .lm-input-area textarea:disabled { opacity: 0.5; }
  .lm-send-btn {
    padding: 8px 16px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 600; white-space: nowrap;
  }
  .lm-send-btn:hover { background: var(--accent-hover); }
  .lm-send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .lm-typing { display: inline-flex; gap: 4px; padding: 4px 0; }
  .lm-typing span {
    width: 6px; height: 6px; background: var(--text-dim);
    border-radius: 50%; animation: lmBounce 1.2s infinite;
  }
  .lm-typing span:nth-child(2) { animation-delay: 0.2s; }
  .lm-typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes lmBounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .lm-think {
    font-size: 11px; color: var(--text-dim);
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; margin-bottom: 6px; overflow: hidden;
  }
  .lm-think summary {
    padding: 4px 8px; cursor: pointer; user-select: none;
    font-style: italic;
  }
  .lm-think summary:hover { color: var(--text); }
  .lm-think pre {
    padding: 6px 8px; white-space: pre-wrap; word-break: break-word;
    max-height: 200px; overflow-y: auto; margin: 0;
    border-top: 1px solid var(--border);
  }
  .lm-msg .lm-explanation { margin-bottom: 4px; white-space: pre-wrap; }
  .lm-streaming-status {
    color: var(--text-dim); font-style: italic; font-size: 12px;
  }

  .lm-skill-tag {
    display: inline-block; font-size: 10px; padding: 1px 6px;
    border-radius: 3px; font-weight: 600; margin-right: 4px;
  }
  .lm-skill-tag.edit { background: var(--accent); color: #fff; }
  .lm-skill-tag.find_replace { background: var(--orange); color: #fff; }
  .lm-skill-tag.rename_roles { background: #d946ef; color: #fff; }
  .lm-skill-tag.chat { background: var(--border); color: var(--text-dim); }

  .lm-scope-tag {
    display: inline-block; font-size: 10px; padding: 1px 6px;
    border-radius: 3px; background: var(--surface2); color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .lm-ops-list { margin-top: 6px; }
  .lm-op-item {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 5px 8px; margin-top: 4px; font-size: 11px; font-family: 'Consolas', monospace;
  }
  .lm-op-find { color: var(--red); }
  .lm-op-replace { color: var(--green); }
  .lm-op-arrow { color: var(--text-dim); margin: 0 4px; }

  .lm-preview { margin-top: 8px; }
  .lm-preview-summary {
    font-size: 11px; color: var(--text-dim); margin-bottom: 4px;
  }
  .lm-preview-item {
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    padding: 6px 8px; margin-top: 4px; font-size: 11px;
  }
  .lm-preview-item .label { color: var(--accent); font-weight: 600; margin-bottom: 2px; }
  .lm-diff-old { color: var(--red); text-decoration: line-through; }
  .lm-diff-new { color: var(--green); }
  .lm-preview-toggle {
    font-size: 11px; color: var(--accent); cursor: pointer;
    background: none; border: none; padding: 2px 0; text-decoration: underline;
  }

  .lm-rename-item {
    display: grid; grid-template-columns: 100px 1fr; gap: 6px;
    padding: 4px 8px; font-size: 12px; align-items: center;
    background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
    margin-top: 4px;
  }
  .lm-rename-item .old-name { color: var(--text-dim); }
  .lm-rename-item .new-name { color: var(--accent); font-weight: 600; }
  .lm-apply-all-btn {
    margin-top: 8px; padding: 6px 14px; font-size: 12px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 6px; cursor: pointer; font-weight: 600;
  }
  .lm-apply-all-btn:hover { background: var(--accent-hover); }
  .lm-apply-all-btn:disabled { opacity: 0.4; cursor: default; }
  .lm-apply-all-btn.applied { background: var(--green); }

  @media (max-width: 800px) {
    .clip-card { grid-template-columns: 1fr; gap: 8px; }
    .clip-actions { flex-direction: row; flex-wrap: wrap; min-width: unset; }
    header { flex-direction: column; align-items: flex-start; }
    .server-config { margin-left: 0; }
    .server-config input { width: 100%; }
    .vmpanel { width: 100vw; }
    .vm-role-row { grid-template-columns: 1fr; }
    .app-body { flex-direction: column; }
    .app-body .lm-sidebar { width: 100%; height: 50vh; border-left: none; border-top: 1px solid var(--border); }
    .app-body .lm-sidebar.collapsed { height: 0; }
  }
</style>
</head>
<body>

<header>
  <h1>TTS Voice Reviewer</h1>
  <span class="mode-badge" id="modeBadge">--</span>
  <div class="selector-group" id="selectorGroup" style="display:none">
    <label>Scenario</label>
    <select id="selScenario"><option value="">-- loading --</option></select>
  </div>
  <div class="selector-group" id="episodeGroup" style="display:none">
    <label>Episode</label>
    <select id="selEpisode"><option value="">--</option></select>
  </div>
  <div class="selector-group" id="playGroup" style="display:none">
    <button class="btn" id="btnPlayAll" disabled>&#9654; 전체 재생</button>
    <button class="btn" id="btnStopAll" disabled>&#9632; 정지</button>
    <button class="btn primary" id="btnRegenAll" onclick="regenAllClips()" disabled>&#9889; 전체 재생성</button>
    <button class="btn" id="btnBatch" onclick="openBatchPanel()" style="background:var(--accent);color:#fff;border-color:var(--accent)">&#9881; 배치 생성</button>
    <button class="btn" id="btnVoiceMap" onclick="openVoiceMapPanel()">Voice Map</button>
    <button class="btn" id="btnLmChat" onclick="toggleLmPanel()" style="background:#1a7f37;color:#fff;border-color:#1a7f37">LM Chat</button>
  </div>
  <div class="server-config">
    <span class="status-dot" id="serverStatus" title="TTS 서버 상태"></span>
    <input id="ttsApiBase" type="text" placeholder="TTS API Base URL"
           value="http://100.66.68.140:8080">
    <button class="btn btn-sm" id="btnPing">연결 확인</button>
  </div>
</header>

<div class="app-body" id="appBody">
<main>
  <div class="stats-bar" id="statsBar"></div>
  <div id="clipContainer">
    <!-- folder picker banner or clip list -->
  </div>
</main>

<div class="playback-bar" id="playbackBar">
  <button class="btn btn-sm" id="pbPrev">&#9664;&#9664;</button>
  <audio id="audioPlayer" controls></audio>
  <button class="btn btn-sm" id="pbNext">&#9654;&#9654;</button>
  <div class="now-playing" id="pbNowPlaying">--</div>
</div>

<div class="queue-panel" id="queuePanel">
  <div class="queue-info">
    재생성 큐: <strong id="queueCount">0</strong>개 대기 / <strong id="queueDone">0</strong>개 완료
  </div>
  <div class="queue-progress"><div class="queue-progress-bar" id="queueProgressBar"></div></div>
  <button class="btn danger btn-sm" id="btnClearQueue">큐 초기화</button>
  <div class="queue-log" id="queueLog"></div>
</div>

<!-- Batch Generation Panel -->
<div class="batch-overlay" id="batchOverlay" onclick="closeBatchPanel()"></div>
<div class="batch-panel" id="batchPanel">
  <div class="batch-panel-header">
    <h2>&#9881; 배치 TTS 생성</h2>
    <button class="btn btn-sm" onclick="closeBatchPanel()">&#10005;</button>
  </div>
  <div class="batch-panel-body">
    <p style="font-size:12px;color:var(--text-dim);margin-bottom:12px">
      시나리오를 선택하고 전체 TTS를 생성합니다. Fish Speech → M4A 변환 → 파일 저장 → Manifest 업데이트.
    </p>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="btn btn-sm" onclick="batchSelectAll(true)">전체 선택</button>
      <button class="btn btn-sm" onclick="batchSelectAll(false)">전체 해제</button>
    </div>
    <div class="batch-scenario-list" id="batchScenarioList"></div>

    <div class="batch-options">
      <label><input type="checkbox" id="batchOptClean"> 기존 파일 삭제 후 생성</label>
      <label><input type="checkbox" id="batchOptSkipExist" checked> 기존 파일 건너뛰기</label>
    </div>

    <div class="batch-stats" id="batchStats"></div>
    <div class="batch-progress-bar" id="batchProgressBar" style="display:none">
      <div class="fill" id="batchProgressFill"></div>
    </div>
    <div class="batch-log-area" id="batchLog" style="display:none"></div>
  </div>
  <div class="batch-panel-footer">
    <span style="font-size:11px;color:var(--text-dim)" id="batchFooterInfo">--</span>
    <span class="spacer"></span>
    <button class="btn" onclick="closeBatchPanel()">닫기</button>
    <button class="btn" id="btnBatchCancel" onclick="cancelBatchGeneration()" style="display:none;background:var(--red);color:#fff;border-color:var(--red)">&#9632; 중단</button>
    <button class="btn primary" id="btnBatchStart" onclick="runBatchGeneration()">&#9889; 생성 시작</button>
  </div>
</div>

<!-- Voice Map Panel -->
<div class="vmpanel-overlay" id="vmOverlay" onclick="closeVoiceMapPanel(false)"></div>
<div class="vmpanel" id="vmPanel">
  <div class="vmpanel-header">
    <h2>Voice Map Editor</h2>
    <span class="vm-voice-count" id="vmVoiceCount">--</span>
    <button class="btn btn-sm" onclick="fetchServerVoices()">&#128193; 음성 라이브러리 폴더</button>
    <button class="btn btn-sm" onclick="closeVoiceMapPanel(false)">&#10005;</button>
  </div>
  <div class="vmpanel-body" id="vmBody">
    <!-- Voice Browser: hover-to-play -->
    <div class="vb-container" id="vbContainer">
      <div class="vb-header" onclick="$('vbBody').style.display = $('vbBody').style.display === 'none' ? '' : 'none'">
        <h3>Voice Browser (hover-to-play)</h3>
        <span style="font-size:11px;color:var(--text-dim)" id="vbCount">0</span>
      </div>
      <div id="vbBody">
        <input class="vb-search" id="vbSearch" type="text" placeholder="음성 이름 검색..." oninput="renderVoiceBrowser()">
        <div class="vb-grid" id="vbGrid"></div>
        <div class="vb-assign-bar">
          <span>hover = 미리듣기 | 클릭 = 역할에 할당</span>
          <span id="vbNowPlaying" style="margin-left:auto;color:var(--accent)"></span>
        </div>
      </div>
    </div>

    <!-- Role mapping list -->
    <input class="vm-search" id="vmSearch" type="text" placeholder="역할 또는 음성 검색...">
    <div id="vmRoleList"></div>
  </div>
  <div class="vmpanel-footer">
    <button class="btn" onclick="closeVoiceMapPanel(false)">닫기</button>
    <button class="btn primary" id="btnVmSave" onclick="saveVoiceMap()">voice_map.json 저장</button>
  </div>
</div>

<!-- Role Picker Popup (for voice chip click) -->
<div class="vb-role-picker" id="vbRolePicker" style="display:none"></div>

<!-- LM Studio Chat Sidebar -->
<div class="lm-sidebar" id="lmSidebar">
  <div class="lm-panel" id="lmPanel">
    <div class="lm-panel-header">
      <h2>LM Chat</h2>
      <span style="font-size:11px;color:var(--text-dim)" id="lmStatus">--</span>
      <button class="btn btn-sm" onclick="lmClearChat()" title="대화 초기화">&#8634;</button>
      <button class="btn btn-sm" onclick="toggleLmPanel()" title="패널 접기">&#10005;</button>
    </div>
    <div class="lm-config" id="lmConfig">
      <div class="lm-config-row">
        <label>서버</label>
        <input id="lmServerUrl" type="text" placeholder="LM Studio URL" value="http://100.66.10.225:1234">
        <span class="status-dot" id="lmServerDot"></span>
        <button class="btn btn-sm" onclick="lmConnect()">연결</button>
      </div>
      <div class="lm-config-row">
        <label>모델</label>
        <select id="lmModelSelect" disabled>
          <option value="">-- 연결 필요 --</option>
        </select>
      </div>
      <div class="lm-config-row">
        <label>Max</label>
        <input id="lmMaxTokens" type="number" value="8192" min="512" max="32768" step="512"
               style="width:80px;flex:none">
        <span style="font-size:11px;color:var(--text-dim)">tok</span>
        <span style="font-size:11px;color:var(--text-dim);margin-left:auto" id="lmCtxEstimate">--</span>
      </div>
    </div>
    <div class="lm-skill-info" id="lmSkillInfo">
      <span class="lm-skill-badge">SKILL</span>
      <span id="lmSkillDesc">시나리오를 선택하면 컨텍스트가 전달됩니다</span>
    </div>
    <div class="lm-messages" id="lmMessages">
      <div class="lm-msg system-msg">LM Studio 서버에 연결하고 모델을 선택하세요</div>
    </div>
    <div class="lm-input-area">
      <textarea id="lmInput" placeholder="대본 수정 요청... (Shift+Enter: 줄바꿈, ↑↓: 히스토리)" rows="2" disabled></textarea>
      <button class="lm-send-btn" id="lmSendBtn" onclick="lmSendMessage()" disabled>전송</button>
    </div>
  </div>
</div>
</div><!-- /app-body -->

<div class="toast-container" id="toastContainer"></div>

<script src="tts-reviewer-state.js"></script>
<script src="tts-reviewer-data.js"></script>
<script src="tts-reviewer-ui.js"></script>
<script src="tts-reviewer-tts.js"></script>
<script src="tts-reviewer-voicemap.js"></script>
<script src="tts-reviewer-batch.js"></script>
<script src="tts-reviewer-lm.js"></script>
<script>
// Init entry point — all code is in external JS modules
(async function init() {
  restoreFromCache();

  if (isFileProtocol) {
    $('modeBadge').textContent = 'FILE://';
    $('modeBadge').className = 'mode-badge';

    if (window.showDirectoryPicker) {
      await tryRestoreHandles();
    } else {
      $('clipContainer').innerHTML = `
        <div class="folder-banner">
          <h2>브라우저 지원 필요</h2>
          <p>
            file:// 모드에서는 File System Access API가 필요합니다.<br>
            <strong>Chrome</strong> 또는 <strong>Edge</strong> 브라우저를 사용해주세요.<br>
            또는 HTTP 서버로 실행하세요:
            <code style="background:var(--bg);padding:4px 8px;border-radius:4px;display:block;margin-top:8px">
              python -m http.server 8899
            </code>
          </p>
        </div>
      `;
    }
    pingServer();
  } else {
    $('modeBadge').textContent = 'HTTP';
    $('modeBadge').className = 'mode-badge http';
    await loadVoiceMap();
    initSelectors();
    $('clipContainer').innerHTML = '<div class="loading">시나리오를 선택하세요</div>';
    restoreSelection();
    pingServer();
  }
})();
</script>
</body>
</html>
